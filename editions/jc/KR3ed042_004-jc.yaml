躁自汗咳嗽及瘴病初作胸腹滿悶檳榔煎即平胃散加檳榔草果煨姜治山嵐瘴氣消風百解散即平胃散去厚朴加荊芥麻黃白芷治傷風咳嗽頭痛鼻塞聲重者厚朴湯即平胃散加乾薑吳茱萸湯即生料平胃散冬月加吳茱萸川椒乾薑桂治飲食進退藿香正氣散即不換金正氣散去蒼朮換白朮加白芷桔梗紫蘇大腹皮茯苓薑棗煎服如欲汗去棗加蔥白三莖熱服溫覆取汗吳綬曰此乃宋人所制非正傷寒之藥也若病在太陽經頭疼發熱骨節痛者與此方全無相干如妄用之先虛正氣逆其經絡雖汗出不解變成壞證多矣凡傷寒發熱脈沉與元氣素虛並夾陰傷寒發熱者切宜戒之吳山甫曰風寒客於皮毛腠理則宜解表若四時不正之氣由鼻而入不在表而在裡故不用大汗而以芬香利氣之品以避不正之氣佐以白朮茯苓甘平之品以培養中氣也用者宜慎之順氣木香散即藿香正氣散加木香玄胡索治心腹痛嘔惡二香湯即藿香正氣散加香藿扁豆葛根治暑月熱病兼有內傷生冷飲食停滯嘔吐噁心中脘痞悶或憎寒惡風手足拘急者棗肉平胃散即平胃散加生薑紅棗各二兩上伴銼碎拌勻以水浸過面上半寸許煮令水乾取出焙燥碾為細末每服二錢用鹽湯點空心食前服治脾胃不和不思飲食心腹脅肋脹滿刺痛口苦無味胸滿短氣嘔噦噁心噫氣吞酸面色萎黃肌體瘦弱怠隋嗜臥體重節痛常多自利或發霍亂及五噎入痞膈氣反胃並宜服之複方白朮附子湯即平胃散合四苓散去甘草加半夏桂附治勞倦所傷量虛實加減對金飲子一名胃苓湯即平胃散合五苓散治傷暑泄瀉煩渴小水不利霍亂吐瀉及產後遍身浮腫黃白散即平胃合六一散治泄瀉煩渴及傷暑小便不利柴平散即平胃合小柴胡湯治濕瘧手足沉重寒多熱少一身盡痛者除濕湯即平胃合二陳湯加白朮藿香治風濕所傷身體重著腰腳痠疼大便溏泄小便或澀或利藿薷湯即藿香正氣散合黃連香薷飲治暑術香交加散即藿香正氣散合六和湯治痢烏梅丸治傷寒靜而時煩者為臟寒蛔上入其膈故煩得食而嘔吐蛔者烏梅三百枚細辛六兩乾薑十兩當歸四兩黃連一斤附子六兩炮去皮蜀椒四兩去汗桂枝六兩去皮人參六兩黃柏六兩上十味異搗篩合治之以苦酒浸烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日二服稍加至二十丸禁生冷滑物臭食等按成無己云肺主氣肺欲收急食酸以收之烏梅之酸以收肺氣脾欲緩急食甘以緩之人參之甘以緩脾氣寒淫於內以辛潤之以苦堅之當歸桂椒細辛之辛以潤內寒寒淫所勝平以辛熱姜附之辛熱以勝寒蛔得甘則動得苦則安黃連黃柏之苦以安蛔烏梅散用烏梅肉黃連當歸附子炮熟艾各七錢半阿膠炒肉豆蔻赤石脂各一兩甘草半兩上為細末不拘時粥飲調下二錢治霍亂嘔吐薏苡附子散治胸痹緩急者薏苡仁十五兩大附子十枚炮上二味杵為散服方寸匕日三服薏苡附子敗醬散用薏苡仁十分附子二分敗醬五分杵為末取方寸匕以水二升煎減半頓服治腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腸內有癰膿服之小便當下葦莖湯用葦莖二升薏苡仁半升桃仁五十枚瓜瓣半升以水一斗先煮葦莖湯五升去滓內諸藥煮取二升服一升治咳有微熱煩滿胸中甲錯是為肺癰再服當吐如膿秘方換腿丸用薏苡仁附子炮去皮臍石楠葉天南星洗薑製炒川牛膝酒浸焙肉桂去粗皮當歸去蘆天麻去苗羌活防風去叉石斛去根萆薢微炙黃耆蜜炙續斷各一兩蒼朮米泔浸一兩半檳榔半兩乾木瓜四兩上為細末麵糊為丸如梧桐子大每服三十丸至五十丸空心溫酒或木瓜湯吞下日進三服治腎經虛弱下注腰膝或當風取涼冷氣所乘沉重少力移步遲緩肋脈攣痛不能屈伸腳心隱痛有妨履地大治乾溼腳氣赤腫痛楚發作無時呻呤難忍氣滿喘促舉動艱難面色黧黑傳送秘濕並皆治之天雄散治虛勞男子失精女子夢交等證天雄三兩炮白朮八兩桂枝六兩龍骨三兩上四味杵為散酒服半錢匕日三服不知稍增之玉霜丸用天雄十兩長大者以酒浸七日掘一地坑以半秤炭火燒坑通赤速去炭火令淨以醋二升發於地坑內候乾承熱便投天雄在內以盆合土擁之經宿取出去皮臍白龍骨一斤黏舌者細研如粉以水飛過三度日中曬乾用黑豆一斗蒸一伏時以夾絹袋盛日曬乾磁石醋淬七次硃砂飛研澤瀉洗酒浸一宿炙牛膝去苗酒浸焙乾石斛去根炙蓯蓉去皮酒浸一宿炙乾巴戟穿心者各二兩茴香炒肉桂去粗皮各一兩家韭子微炒菟絲子酒浸一伏時蒸過日乾杵羅為末去輕浮者各五兩牡蠣火煅紫梢花各三兩鹿茸酒浸半兩上一十六味搗羅為細末煉酒蜜各半和丸如梧子大每服三十丸空心晚食前溫酒下治真氣虛憊下焦傷竭臍腹弦急腰腳軟痛精神困倦面色枯槁或亡血盜汗遺瀝失精大便自利小便滑數肌肉消瘦陽事不舉久服續骨聯筋秘精堅髓延年保命卻老還童安魂定魄換肌秘氣輕身壯陽益壽住世文蛤散治傷寒病在陽應以汗解反以冷水噀之其熱被劫彌更肉上粟起意欲飲水者文蛤五兩上一味為散以沸湯和一方寸匕取文蛤湯用文蛤石膏各五兩麻黃甘草生薑各三兩杏仁五十個大棗十二枚以水六升煮取二升溫服一升治吐後渴欲得水而貪飲者兼主微風脈緊頭痛汗出即愈太乙紫金丹用文蛤捶破淨研三兩山慈菇去皮淨二兩千金子去殼研去油取霜一兩紅牙大戟去蘆洗淨焙乾一兩半麝香三錢另研上除千金子麝香外三味為細末卻入研藥令勻用糯米煮濃飲為丸分為四十粒每服一丸研生薑薄荷汁井華水研服干薄荷濃煎湯冷磨服亦佳通利水兩行無妨只用溫白粥止住合時宜用端午七夕重陽日合或遇天德月德日亦佳合時要在淨室焚香至誠修制毋令婦人雞犬見效驗不可具述宜珍藏之喻良能云裴丞相傳此以為濟世衛生之寶兒人居家或出入不可無此藥如毒最多若遊宦嶺表才覺意思不快治一切毒如被狐貍毒鼠莽毒惡菌河魨毒食疫死牛馬肉毒或犬惡蟲所傷又治癰疽發背及療魚臍瘡人多不識喚作癰疽致命殺人者反治諸風癮疹赤腫瘤等柏葉湯治吐血不止者柏葉乾薑各三兩艾三把上三味以水五升取馬通汁一升合熬取一升分溫再服四生丸即柏葉湯去乾薑加懷生地小荷葉等分丸如雞子大一團水煎服治吐血愚加小薊茅根名六生丸治血更捷蒲黃散即柏葉湯加蒲黃三合乾地黃桑耳甘草芒硝茯苓人參阿膠各二兩禹餘糧黃連各一兩赤石脂一兩二錢半上㕮咀以水一斗煮取四升分作五服治血痢木香散即柏葉湯去艾加木香甘草炙黃芩各半兩當歸炒白朮干熟地黃各七錢半黃連炒五錢上銼散每服三錢水一盞煎至五分去滓不拘時服治冷熱痢虛損腹痛不能飲食日漸乏力斷下湯用乾薑炒五分艾葉醋炒人參去蘆熟地黃各一錢海螵蛸燒灰當歸洗各二錢川芎七分阿膠蛤粉炒成珠七分半上作一服用水二鍾煎至八分食前服治婦人衝任氣虛崩中漏下經脈不調每遇月候將來臍腹腰腳先痛漸減飲食四肢乏力及帶下三十六疾悉能療之茅根湯療溫病有熱飲水暴冷啘者茅根葛根各半升上以水四升煮取二升稍溫飲之啘止則停茅根橘皮湯用白茅根一升陳皮三兩桂心三兩葛根二兩以水六升煮取三升每服三合數連服之盡後合啘止而停耳微有熱減桂二兩忌生蔥療春夏天行傷寒溫病於胃冷變呃枇杷飲用枇杷葉去毛茅根各半升以水四升煮取二升稍稍飲之呃止則停療瘟病有熱飲水暴冷而呃茅根湯用白茅根八兩瞿麥白茯苓各四兩葵子人參各二兩蒲黃桃膠滑石甘草各一兩紫貝十個燒石首魚枕石煅上銼為散每服四錢水一盞半姜三片燈心二十莖煎至七分去滓溫服亦可為末木通煎湯調下治產後諸淋通草湯用茅根通草葵子王不留行蒲黃炒桃膠瞿麥滑石各一錢半甘草炙一錢上作一服水二鍾煎至一鐘不拘時服治諸淋如聖散用白茅根馬藺花麥門冬去心車前子甜葶藶苦葶藶炒檀香連翹各等分上為細末每服四錢水煎熱服如渴加黃芩同煎入燒鹽少許服治沙淋小腹脹滿酸棗仁湯治虛勞虛煩不得眠者酸棗仁二升甘草一兩知母二兩茯芩二兩芎藭二兩深師有生薑三兩上五味以水八升煮酸棗仁得六升內諸藥煮取三升分溫三服茯神湯用酸棗仁炒遠志去心各一錢二分茯神去皮木一錢半石菖蒲人參白茯苓各一錢黃連生地黃各八分當歸一錢酒洗甘草四分水二鍾連子七枚捶碎煎八分食前服治欲心大熾思想太過夢泄不禁夜臥不寧心悸龍齒補心湯用酸棗仁炒白茯苓去皮龍齒另研煅人參去蘆熟地黃洗焙當歸酒浸焙乾桔梗去蘆茯神去皮木肉桂去皮麥門冬去心綿黃耆蜜炙遠志水浸去心薑製炒枳殼麩炒半夏曲白朮各一錢甘草炙半錢上作一服水二鍾生薑三片粳米一撮煎一鍾服無時治諸虛不足虛熱潮來心神驚惕睡臥不寧小便油濁大茴香丸用酸棗仁炒大茴香破故紙炒白朮白茯苓左顧牡蠣碢鍋內慢火煆爆為度益智仁人參各等分為細末用青鹽酒糊丸如梧子大每服二十丸食前用溫酒或米飲下治小便白濁出髓條旋覆代赭湯治傷寒發汗吐下後心下痞噫氣不除者旋覆花三兩人參二兩生薑五兩代赭石一兩甘草三兩半夏半升大棗十枚上七味以水一斗煮取六升去滓再煎取三升溫服一升日三旋覆花湯用旋覆花三兩蔥十四根新絳少許以水三升煮取一升頓服之治婦人半產漏下五飲湯用旋覆花去梗人參去蘆半夏湯泡甘草炙枳實麩炒茯苓去皮白朮厚朴薑製豬苓澤瀉前胡桂心芍藥陳皮去白以上各一錢上作一服用水二鍾生薑十片煎至一鐘不拘時服或因酒多加乾葛砂仁治一留飲心下二澼飲脅下三痰飲胃中四溢飲膈上五流飲腸間凡此五飲酒後飲冷過多故有此疾芎菊散用旋覆花草決明蟬蛻洗以上各一錢芎藭甘菊花各一兩白殭蠶炒細辛去葉防風去皮羌活以上各三分天麻密蒙花荊芥穗甘草炙以上各半兩上為細末每服二錢水一鍾煎七分食後溫服湯點亦可治諸陽受風頭目旋運目視昏暗肝氣不清礬石丸治婦人經水閉不利藏堅癖不止中有乾血下白物者礬石三分燒杏仁一分上二味末之煉蜜丸棗核大內藏中劇者再內之硝石礬石散用硝石礬石燒等分為散以大麥粥汁和服方寸匕日三服治女勞疸膀胱急少腹滿身盡黃額上黑足下熱因作黑疸服之病隨大小便去小便正黃大便正黑是候也腹滿者難治千金用滑石石膏治症同不知孰是礬石湯用礬石二兩上下班一味以漿水一斗五升煎三五沸浸腳良治腳氣衝心玉龍丸用礬石硝石滑石硫黃各一兩用無根水滴為丸治一切暑毒伏暑腹脹疼痛神效大黃龍丸用礬石雄黃滑石各半兩硝石舶上硫黃各一兩白麵四兩上五味研末入面和勻滴水丸如梧子大每服三十丸新井水下管見云有中暍昏厥灌之立蘇治中暑身熱頭疼狀如脾寒或煩渴嘔吐昏悶不食玉液丸用礬石枯碾細半夏湯洗為細末各十兩寒水石煆令赤出火毒水飛過二十兩上研和勻用麵糊和丸如梧桐子大每服三十丸食後生薑湯送下治風壅化痰涎利咽膈清目止咳嗽除煩熱白頭翁湯治傷寒熱利下重者白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去滓溫服一升白頭翁加甘草阿膠湯即白頭翁湯加甘草阿膠各三兩治產後下利虛極者
