body:
  text: 卷之四越鞠丸一名芎術丸治六郁胸膈痞滿或吞酸嘔吐飲食不化薛立齋方加山楂麥芽蒼朮米泔浸炒撫芎山梔炒黑香附醋炒神麯炒香上各等分為末滴水丸綠豆大每服六七十丸白沸湯下春加防風夏加苦參秋冬加吳茱萸乃經所謂升降浮沉則順之寒熱溫涼則逆之按丹溪曰氣血沖和萬病不生一有拂鬱諸病生焉故人身諸病多生於郁蒼朮撫芎總解諸郁隨證加入諸藥凡郁皆在中焦以蒼朮撫芎開提其氣以升之假如食在氣上只提其氣則食自降矣又云蒼朮山梔大能除郁因食冷物鬱火於脾胃中脾胃屬土伏火地中此病多因血虛而得又有胃虛過食冷物郁陽氣於脾胃中者食鬱越曲丸即越鞠丸加山楂砂仁治食噎膈茭山五郁湯即越鞠丸去蒼朮加青皮甘草能解諸郁痰火越鞠丸即越鞠丸加海石南星栝蔞青黛治痰因火動令人𩞄雜火鬱越鞠丸即越鞠丸加青黛治七情拂鬱吞酸小便赤脈來沉數者六郁湯即越鞠丸合二陳湯加砂仁治諸郁血鬱加桃仁紅花牡丹皮氣鬱加烏藥木香痰鬱加南星枳殼小皂莢濕鬱加白朮倍蒼朮熱鬱加黃連倍山梔食鬱加山楂麥芽青皮倍神麯氣鬱湯即越鞠丸無神麯合二陳湯加貝母蘇葉木香檳榔生薑煎服治因求謀不遂或橫逆之求或貧窘所迫或暴怒所傷或悲哀所致或思念太過皆為氣鬱其狀胸滿脅痛脈沉而澀者也濕鬱湯即越鞠丸無神麯山梔合二陳湯白朮厚朴羌獨活治因雨露所襲或嵐氣所侵或坐臥濕地或汗出衣衫皆為濕鬱其狀身重而痛倦怠嗜臥遇陰寒則發脈沉而細緩者是也血鬱湯用香附便制二錢牡丹皮赤曲通草山楂麥芽蘇木穿山甲降香各一錢紅花七分水酒各半煎去滓入桃仁泥七分韭汗半盞和勻溫服治七情鬱結盛怒叫呼或起居失宜或挫閃致瘀飢飽勞役皆能致血鬱其脈沉澀而芤胸脅常如針刺者是也熱鬱湯即涼膈散去硝黃加麥門冬鬱金栝蔞穰治非陰虛非陽陷亦不發熱而常自蒸蒸不解者或問何不用蒼朮香附撫芎曰火就燥燥藥皆能助火故不用也枳朮湯治心下堅大如盤邊如旋盤水飲所作枳實七枚苦寒白朮二兩甘溫上二味以水五升煮取三升分溫三服腹中耎即當散也潔古枳朮丸用枳實麩炒四兩白朮土炒八兩為細末荷葉煨飯入湯杵膏去滓為丸如綠豆大每服五六十丸清米飲下或用荷葉陳米煎湯發丸更妙治胸膈痞滿宿食不消能強胃半夏枳朮丸即枳朮丸加半夏四兩薑製治食冷傷脾胃胃中有痰橘皮枳朮丸即枳朮丸加橘皮四兩治老幼元氣虛弱飲食不消或臟腑不調心下痞悶橘半枳朮丸即枳朮丸加橘皮半夏各四兩寬中健脾木香枳朮丸即枳朮丸加木香二兩破痰順氣消化宿滯開胃進食香砂枳朮丸即枳朮丸加砂仁香附各二兩治脾胃虛弱飲食減少胸膈痞悶鞠柏枳朮丸即枳朮丸加神麯麥柏炒各四兩治飲食過多不能克化以致心腹脹悶不快加味枳朮丸即鞠柏枳朮丸加半夏山楂各四兩薑黃陳皮各二兩木香一兩治痞消食化痰止嗽寬中利膈助胃和脾一方無半夏名枳實丸治積塊一方無橘皮半夏木香有砂仁橘連枳朮丸即枳朮丸加橘皮黃連各四兩治傷肉味痞滿三黃枳朮丸即枳朮丸加黃芩黃柏黃連清痰利胸膈一方加陳皮神麯去黃柏加大黃治傷肉食麵食辛辣味厚之物填塞胸中致滿悶不快芩連枳朮丸即枳朮丸加黃芩黃連各二兩清心化痰平補枳朮丸即枳朮丸加陳皮黃連各二兩白芍藥三兩人參木香各一兩減白朮三兩枳實三兩平補氣血去痰通氣木香乾姜枳朮丸即枳朮丸加木香乾姜各二兩破除寒食滯氣木香人參枳朮丸即枳朮丸加木香乾姜人參陳皮開胃進食枳實導滯丸即枳朮丸加大黃黃連黃芩神麯茯苓澤瀉治傷濕熱之物不得消化而作痞滿枳實消痞丸即枳朮丸加四君子湯黃連半夏厚朴乾薑麥芽治心下虛痞惡食懶倦右關脈弦者除濕益氣丸即枳朮丸加神麯卜子炒黃芩紅花治傷濕面心腹滿肢體沉重白朮丸即枳朮丸加橘半神麯黃芩白礬治傷豆粉濕面油膩香蔻和中丸即橘半枳朮丸加木香白豆蔻各二兩治痰食氣逆如胃脘痛加草豆蔻四兩若氣升加沉香二兩消飲丸用白朮八錢枳實麩炒半兩茯苓去皮乾姜泡各三兩上為細末煉蜜和丸如梧子大每服五十丸溫米飲下治療酒澼停飲痰水不消滿逆嘔吐目暗耳聾脅下急痛腹中水聲術香和中丸用白朮一兩二錢枳實麩炒二錢半半夏制陳皮去白各一兩厚朴制一兩檳榔四錢半木香不見火三錢半甘草炙三錢半上為末薑汁浸蒸餅和丸如梧桐子大每服六七十丸食前白湯送下治病久虛弱懨懨不能食而臟腑或秘或溏此胃氣虛弱人常服則和中理氣消痰去濕厚腸胃進飲食茯苓丸即只術丸合六君子湯加葛根乾薑肉桂每味各一兩如法炮製為細末煉蜜和丸如梧桐子大每服三十丸溫米飲空心下治妊娠阻病心中煩憒頭目眩重憎聞食氣嘔逆吐悶顛倒不安四肢困弱不自勝持常服此藥消痰水冷能食強力養胎當先服半夏茯苓湯次進此藥複方枳朮二陳湯即枳朮湯合二陳湯治脾胃痰飲胸膈不利香連丸出兵部手集治赤白諸痢裡急後重腹痛等症其效如神宣黃連苦寒廣木香辛溫上二味等分搗篩白蜜丸如梧子大每服二三十丸空腹飲下日再服久冷者以煨蒜搗和丸之不拘大人嬰儒皆效易簡方黃連用吳茱萸炒過四兩木香麵煨一兩粟米飲丸錢仲陽香連丸加煨熟柯子肉治小兒冷熱痢加煨熟肉豆蔻又治小兒瀉痢加白附子尖又治小兒氣虛瀉痢腹痛劉河間治久痢加龍骨朱丹溪治禁口痢加石蓮肉王氏治痢而渴者加烏梅肉以阿膠化和為丸濟生方秘傳香連丸用黃連四兩木香二兩生薑四兩以姜鋪砂鍋底次鋪連上鋪香新汲水三碗煮焙研醋調蒼朮糊為丸如常服五次韓飛霞四制黃連丸用黃連一斤分作四分一分用酒浸炒一分用薑汁炒一分用吳茱萸湯浸炒一分用益智仁同炒去益智研末加白芍藥酒煮切焙四兩使君子仁焙四兩廣木香二兩為末蒸餅和丸綠豆大每服三十丸米飲食前下日三服治五疳六痢忌豬肉冷水愚按痢疾古名滯下此濕熱之證也蓋黃連性寒而燥寒能清熱燥能去濕故治痢以之為君佐以木香之辛溫以疏通鬱滯使君臣相佐陰陽相濟最得制方之妙所以有成功而無偏勝之害也然治痢當分初中未三治初宜用香連加檳榔大黃等分為丸以順利之中宜竟用香連或連用茱炒若久而不止方用訶子肉蔻龍骨等藥止澀庶不失先後之序大香連丸用黃連去蘆毛二十兩吳茱萸去枝梗十兩同炒令赤色去茱萸不用木香不見火四兩八錢八分為細末醋和為丸如梧子大每服二十丸飯飲吞下空心食前日進二三服治男婦腸胃虛弱冷熱不調泄瀉煩渴水穀不化腹脹腸鳴胸膈痞悶脅肋脹滿或下痢膿血裡急後重夜起頻並不思飲食或小便不利肢體怠惰漸即瘦弱薛立齋將黃連茱萸二味用熟水拌勻入瓷器內置熱湯中頓一日同炒紫黃色去茱用連為末每末四兩入木香末一兩淡醋未飲為丸戊己丸用黃連去須吳茱萸去梗炒白芍藥各等分為細末蒸餅糊為丸如梧桐子大每服二十丸濃煎米飲空心下日三服治脾胃受濕泄利不止臍腹刺痛米穀不化亦治小兒疳氣下痢變通丸用川黃連去毛吳茱萸湯泡過各二兩同炒香揀出各為末以粟米飯和丸如桐子大各收每服三十丸赤痢用黃連丸甘草湯下白痢用茱萸丸薑湯下赤白痢各用十五丸米湯下此乃浙西河山純老方救人甚效左金丸用黃連六兩茱萸一兩同炒為末神麯和為丸如梧子大每服三四十丸白湯下薛立齋用白朮陳皮湯下治肝火脅肋刺痛或發寒熱或頭目作痛泄瀉淋秘一切肝又之症皆效黃連阿膠丸用黃連三兩茯苓二兩為末阿膠一兩炒末水化搜和丸如梧子大每服二十丸食前米飲下治脹胃氣虛冷熱不調下痢赤白狀如魚腦裡急後重腹痛口燥煩渴便閉駐車丸用黃連三十兩乾薑炮十兩當歸去蘆十五兩為細末另用阿膠十五兩炒珠為末以醋煮成膏和前末為丸每服三十丸食前水飲下治下痢腹痛無問新舊冷熱膿血日夜無度者乾薑黃芩黃連人參湯用黃連黃芩乾薑人參治傷寒本自寒下醫復吐下之若食入口即吐者小駐車丸用當歸去蘆二兩訶子炮去核一兩乾薑炮黃連去須各三兩為末用阿膠一兩三分水煎汁和丸如粟米大每服二十丸飯飲下治小兒冷熱不調乳哺失節泄瀉不止下痢鮮血赤多白少腹痛後重腸胃虛滑便數頻並減食困倦太平丸用天門冬麥門冬並去心知母貝母款冬花杏仁去皮尖各二兩當歸生地黃黃連熟地黃阿膠蛤粉炒各一兩半蒲黃京墨桔梗薄荷各一兩麝香少許另研上為細末煉蜜為丸如彈子大每服一丸臨睡細嚼薄荷湯送下治癆證久嗽肺癰並宜噙服決定除根二神丸治脾胃虛弱侵晨五更作瀉或全思食或食而不化破故紙四兩炒肉豆蔻二兩生用上二味為末用大紅棗四十九枚生薑四兩切碎水煮熟去姜取棗肉和藥為丸桐子大每服五十丸空心鹽湯下愚按許叔微學士本事方雲孫真人言補腎不若補脾予曰補脾不若補腎腎氣虛弱則陽氣衰劣不能熏蒸脾胃脾胃氣寒令人胸膈痞塞不進飲食遲於運化或腹脅虛脹或嘔吐痰涎或腸鳴泄瀉譬如釜中無火物終不熟飲食何能消化二神丸治脾胃虛寒泄瀉用破故紙補腎肉豆蔻補脾二藥雖兼補但無斡旋子往往常加木香以順其氣使倉廩空虛則受物矣屢用俱效不可不知三神丸即二神丸加木香二兩治見前四神丸即二神丸加五味子二兩吳茱萸一兩為細末生薑八兩紅棗一百枚煮熟取棗肉和末丸桐子大每服五七十丸空心或食前白湯下治脾胃虛弱大便不實飲食不思或瀉痢腹痛等證一方用二神丸加木香茴香炒各一兩一方用神麯麥芽各一兩俱名四神治脾泄腎泄青娥丸用破故紙酒浸炒一斤杜仲去皮薑汁浸炒一斤胡桃肉去皮二十個為末以蒜搗膏一兩和丸桐子大每空心溫酒下二十丸婦人淡醋湯下治腎氣虛弱風冷乘之或血氣相搏腰痛如折俯仰不利或因勞役傷腎或濕痹傷腰或墜墮敗傷或風寒客搏或氣滯不散皆令腰痛或腰間如物重墜起坐艱辛者悉能治之常服壯筋骨活血脈烏髭鬚益顏色補骨脂丸用破故紙十兩揀淨去皮洗過曝搗篩令細胡桃瓤二十兩湯浸去皮細研如泥更以好蜜和令如飴糖瓷器盛之旦日以暖酒二合調藥一匙服之便以飯壓不飲酒入以暖熟水調之禁蕓薹羊肉治陽氣衰絕眾疾俱作久服延年益氣悅心明目補添筋骨此唐相國所傳訶陵國舶主李摩訶方也按破故紙辛溫屬火收斂神明能使心包之火與命門之火相通故元陽堅固骨髓克實澀以治脫也胡桃甘溫屬木潤燥養血血屬陰惡燥故油物以潤之佐破故紙有木火相生之妙故語云破故紙無胡桃猶水母之無蝦也補骨脂丸用補骨脂四兩炒香菟絲子四兩酒蒸胡桃肉一兩去皮乳香沒藥沉香各研二錢半煉蜜丸如梧子大每服二三十丸空心鹽湯溫酒任下自夏至起至冬至止日一服治下元虛敗腳手沉重夜多盜汗縱欲所致此藥壯筋骨益元氣其方乃唐宣宗時張壽太尉知廣州得之番人者養血返精丸用破故紙炒二兩白茯苓一兩為末沒藥五錢以無灰酒浸高一指煮化和末丸如梧子大每服三十丸白湯下𥭕有人服此至老不衰蓋故紙補腎茯苓補心沒藥養血三者既壯自然身安金鎖正元丹用破故紙酒浸炒十兩肉蓯蓉洗淨焙乾紫巴戟去心葫蘆巴炒各一斤五倍子茯苓各八兩龍骨硃砂各三兩為末酒糊丸梧子大每服二十丸空心食前溫酒或鹽湯下治元臟虛寒飲食減少恍惚多忘氣促喘乏夜多異夢心鬆盜汗小便滑數遺精白濁等症青木香丸用破故紙炒香蓽澄茄各四十兩木香二十兩檳榔酸粟米飯裹濕紙包火中煨令紙焦去飯另用黑牽牛二百四十兩炒香別搗取末一百二十兩令勻漸入清水和令得所丸如綠豆大每服二十丸茶湯熱水任下食後服每酒食後可服五丸或七丸小兒一歲服一丸懷妊婦人不得服之能寬中利膈行滯氣消飲食治胸膈噎塞腹脅脹痛心中煩悶痞塞腫滿腸中水聲嘔噦痰逆不思飲食並宜服之五味子丸用破故紙炒人參五味子白朮各二兩山藥炒白茯苓各一兩半吳茱萸川巴戟去心肉果麵裹煨各一兩龍骨煅五錢上為末酒糊丸如梧子大每服七十丸空心鹽湯下治下元虛寒火不生土及腎中之土不足以致關門不閉名曰腎泄亦名脾腎泄縮泉丸治小便頻數此脬氣不足也留州益智子鹽炒去鹽天台烏藥上二味等分為末酒煮山藥粉糊為丸如桐子大每服七十丸空心鹽湯下萆薢分清飲用前方加萆薢石菖蒲等分每服四錢水一盞入鹽一捻煎七分食前溫服治白濁頻數淤面如油澄下如膏乃真元不足下焦虛寒按楊子建云凡人小便頻數不計度數便時莖內痛不可忍者此疾必先大腑秘熱不通水液只就小腸大腑愈加干竭甚則渾身熱心思水如此即重證也一方加茯苓甘草烏沉湯用天台烏藥一百兩沉香五十兩人參三兩甘草爁四兩為末每服半錢姜鹽湯空心點服治一切氣一切冷補五臟調中壯陽暖腰膝去邪氣冷風麻痹膀胱腎間冷氣攻衝背膂俯仰不利風水毒腫吐瀉轉筋症癖刺痛中惡心腹痛鬼氣疰忤天行瘴疫婦人血氣痛一方用香附子二兩烏藥一兩甘草一分為末薑湯服名小烏沉湯香烏散用香附烏藥等分為末每服一二錢飲食不進薑棗湯下瘧疾乾薑白鹽湯下腹中有蟲檳榔湯下頭風虛腫茶湯下婦人冷氣米飲下產後血攻心脾痛童便下婦人血海痛男子疝氣茴香湯下四磨湯用人參烏藥檳榔沉香各磨濃汁七分合煎細細嚥之治七情鬱結上氣喘急五磨飲即四磨湯去人參加枳實木香治氣厥暴死六磨湯即四磨湯加木香枳殼一方無人參有大黃亦各六磨湯治氣滯腹急大便秘澀七香丸用益智仁炒六十兩甘松炒八十兩香附炒去毛丁香皮甘草炒各百二十兩蓬莪朮煨乘熱縮砂仁各二十兩為末水浸蒸餅為丸如綠豆大每服二十丸溫酒薑湯熟水任下或氣脹滿磨烏藥水煎湯下或酒食過度頭眩噁心胸膈滿悶先嚼二十丸後吞二十丸生薑紫蘇湯下此藥性溫平不動臟腑能溫中快膈化積和氣治中酒吐酒嘔逆咽酸氣膈食噎飲食不下冷涎翻胃腹脹脾疼遠年茶酒食積眼臉俱黃赤白痢疾脾毒泄瀉婦人脾血氣小兒疳氣並宜服之元戎有木香集香丸用烏藥益智仁白豆蔻砂仁藿香丁香白檀沉香人參茯苓陳皮甘草一法噎食加柿霜一法加廣朮一法加香附子一法加乾薑隨證定奪分兩為末點服海藏云損其氣者以此藥接之五香散用木香丁香乳香藿香沉香各等分上渣後末每服三錢水一盞半煎至八分去渣食後溫服能升降諸氣宣利三焦疏導壅滯發散邪熱治陰陽之氣鬱結不消諸熱蘊毒腫痛結核或似癰癤而非使人頭痛惡心寒熱氣惡七香丸即五香散加檀香零陵香各等分人參檳榔減半為末蜜丸梧子大細嚼米飲下治脈伏不見心腹痛欲絕者勻氣散即五香散去沉乳加檀香甘草白蔻砂仁等分為末白湯調服治氣滯不勻胸膈虛痞宿冷不消心腹刺痛除脹滿噎塞止嘔吐噁心常服調順脾胃進美飲食五膈寬中散用香附子炒去毛厚朴去皮薑汁炒熟各十六兩甘草五兩砂仁丁香青皮陳皮各四兩木香三兩白豆蔻去皮二兩為末每服二錢入生薑二片鹽少許汁陽點服治因憂恚寒熱動氣傷神致陰陽不腑臟生病結於胸膈之間遂成五膈之病一曰憂膈胸中氣結津液不通飲食不下羸瘦短氣二曰恚膈心下實滿噫輒醋心飲食不消大小便不通三曰氣膈胸脅逆滿噎塞不通噫聞食臭四曰寒膈心腹脹滿咳嗽氣逆腹上苦冷雷追繞臍痛不能食肥五曰熱膈五心中熱口中爛生瘡四肢煩重唇口乾燥身體或熱腰痛背疼胸痹引皆不能多食及一切氣疾並皆治之明醫雜著名木香寬中丸薛立齋云脾胃虧損之症不可多服當與六君子湯兼服之蘇合香丸用白朮青木香烏犀屑香附子炒去毛硃砂研水飛訶黎勒煨取皮白檀香沉香麝香研丁香蓽茇各二兩龍腦研薰陸香別研各一兩上為細末另用安息香二兩別末無灰酒一升熬膏以蘇合香油一兩入安息膏內煉蜜和劑每兩分作十丸用蠟殼封裹每服一丸沸湯或溫酒化下治卒中昏不知人及霍亂吐瀉心腹撮痛鬼疰客忤癲癇驚悸或癲撲傷損氣暈欲絕凡是倉卒之患悉皆療之安息香丸用肉桂去粗皮二兩半訶子炮取皮二兩阿魏細研白麵少許搜和作餅子炙令香熟一分茯苓白底當歸湯洗切片焙乾乾薑炮去皮肉豆蔻去殼川芎丁香皮縮砂仁五味子微炒巴戟去心麵炒益智仁去皮白豆蔻去皮各一兩半硇砂酒半盞化去石入蜜中檳榔炮蓽澄茄芍藥莪朮三稜炮安息香酒半盞化去沙入蜜香附去毛茴香微炒各半兩胡椒高良薑木香沉香乳香微研丁香各一兩上件藥除安息香硇砂外並一處搗羅為細末用蜜三十兩入安息硇砂於蜜中煉熟劑上件藥杵一二千下丸如雞頭子大每服一丸細嚼溫酒下濃煎生薑湯下亦得食前服治一切冷氣心腹疼痛胸膈噎塞脅肋膨脹心下堅痞腹中虛鳴噦逆噁心噫氣吞酸胃中冷逆嘔吐不止宿飲不消胸膈刺痛時吐清水可思飲食丁沉煎丸用丁香十二兩沉香二兩木香一錢半丁皮一兩白豆蔻九兩半上為細末用甘草熬膏為丸每服一丸含化空心食前服治心胸痞