body:
  text: 卷之一澤術麋銜湯治病酒風身熱解惰汗出如浴惡風少氣澤瀉十分術十分麋銜五分合以三指撮為後飯按王太僕云術味甘溫平主治大風止汗麋銜味苦寒平主治風濕筋痿澤瀉味甘寒平主治風濕益氣由此功用方故先之飯後藥先為之後飯澤瀉湯治心下有支飲其人苦冒眩澤瀉五兩白朮二兩上二味以水二升煮取一升分溫再服豬苓散治嘔吐而病在膈上後思水者解急與之思水者此方主之豬苓茯苓白朮各等分上三味杵為散飲服方寸匕日三服茯苓戎鹽湯即豬苓散去豬苓加茯苓三倍戎鹽彈丸大一枚治小便不利五苓散治傷寒溫熱病表裡未解頭痛發熱口燥咽乾煩渴飲水或水入即吐或小便不利及汗出表解煩渴不止者宜服之又治霍亂吐利躁渴引飲並治瘦人臍下有動悸吐涎沫而巔眩此水也茯苓十八銖去皮甘平豬苓十八銖去皮甘平白朮十八銖甘平澤瀉一兩六銖半酸鹹桂半兩去皮辛熱上五味搗為散以白飲和服方寸匕日三服多飲暖水汗出愈如法將息成無己雲苓令也通行津液克伐腎邪專為號令者苓之功也又曰甘字從口從一淡者一也甘甚而反淡甘緩而淡滲二苓白朮味俱甘平潤虛燥而利津液鹹味下泄為陰澤瀉之咸以泄伏水辛甘發散為陽桂枝之辛甘以和肌表利大便曰攻下利小便曰滲泄此太陽膀胱經下藥也太陽病高則汗而發之下則引而竭之使邪從膀胱出也四苓散即五苓散去肉桂治濕生於內水瀉小便不利茵陳五苓散即五苓散加茵陳一方去肉桂加茵陳名加減五苓散治傷寒發黃小便不利豬苓湯即四苓散去白朮加阿膠滑石治脈浮發熱渴欲飲水小便不利茯苓澤瀉湯即五苓散去豬苓加生薑甘草治胃反吐而渴欲飲水者加味五苓散即五苓散加車前子生薑燈心治伏暑反胃濕泄注下或煩或渴或小便閉澀山梔五苓散即本方加山梔子治小兒臍突燈心蜜水調下金沙五苓散即本方加海金沙芍藥甘草滑石石葦治五淋辰砂五苓散即本方加辰砂治中暑煩渴身熱頭疼霍亂吐瀉小便赤少精神恍惚桂苓白朮丸即五苓散去豬苓加生薑硝半夏陳皮糊丸又加黃連黃柏為堅中丸治煩渴複方胃苓湯即五苓散合平胃散治水瀉及夏月感冒暑氣或啖飲日中所曬之物或坐日中熱處而瀉春澤湯即五苓散合四君子湯治無病而渴與病後渴及汗下及霍亂吐瀉津液去多五內枯燥而煩甘露飲即五苓散合益元散去豬苓加石膏寒水石治暑若甘露飲不去豬苓不加石膏名桂苓甘露飲治暑熱二氣濕瀉注下或煩渴或小便閉澀桂苓白朮散即五苓合益元散加寒水石石膏治冒暑濕熱吐瀉轉筋腹痛靈樞半夏湯治邪客臟腑陽盛陰虛目不能瞑秫米一升半夏五合用千里外來流水八升揚之萬遍取其清五升入二味炊以葦薪徐炊令竭為一升半去其滓飲汁一小杯日三稍益以知為度其病新發者覆杯則取汗出則已矣久者三飲而已也愚按本草半夏味辛平秫米味甘微寒內經曰以辛散之以甘緩之難經曰陽蹺為病陽緩而陰急陽盛故以辛散之陰急故以甘緩之流水取其動而不居葦薪取其空而不窒正經所謂決瀆壅塞經絡大通陰陽和得者也大半夏湯治胃反嘔吐者半夏二升人參三兩白蜜一升上三味以水一斗二升和蜜揚之二百四十遍煮藥取二升半溫服一升余分再服小半夏湯嘔家本渴渴者為欲解今反不渴心下有支飲故也此方主之半夏一升生薑半斤上二味以水七升煮取一升半分溫再服活人名半夏生薑湯治嘔欲絕半夏散及湯方半夏桂枝甘草各等分治少陰病咽中痛半夏生薑大黃湯即生薑半夏湯加大黃治反胃半夏麻黃丸即小半夏湯去生薑加麻黃等分蜜丸如小豆大每服三丸治心下悸者千緡湯即小半夏湯加皂角一寸治痰涎上湧喉中有聲小陷胸湯即小半夏湯去生薑加黃連一兩栝蔞實一枚治小結胸病在心下按之痛者生薑半夏湯即小半夏湯半夏止用半升生薑汁一升以水三升煮半夏取二升內生薑汁煮取一升半小冷分四服日三夜一服病已止服治病人胸中似喘不喘似嘔不嘔似噦不噦心中憒憒然無奈者元戎方二味止各三錢量水煎至七分服止嘔吐開胃消食半夏乾薑散半夏乾薑各等分杵為散取方寸匕漿水一升半煎取七合頓服之治乾嘔吐逆吐涎沫者二味等分為末生薑和汁為丸桐子大名溫中丸每服二十丸木瓜湯下治脾寒嘔吐咳嗽自利小半夏加茯苓湯即小半夏湯加茯苓三兩治卒嘔吐心下痞膈間有水眩悸者活人名大半夏湯治痰飲脾胃不和消暑丹半夏一斤茯苓半斤生甘草半斤以醋五升煮半夏盡醋曬乾薑汁作糊無見生水每服五十丸熱水送下治傷暑諸證藥下即蘇且止渴利小便並治痰飲停積並生薑湯下夏月常服止渴利小便雖飲水多亦不為害應是暑藥皆不及此橘皮湯活人名姜橘湯又名二賢湯治乾嘔噦若手足厥者此方主之橘皮四兩生薑半斤上二味以水七升煮取三升溫服一升下咽即愈乳和姜皮湯即橘皮湯用牛乳一大盞和藥煎熱去滓入生牛乳一半頓服治赤白下痢神驗橘皮竹茹湯即橘皮湯加竹茹大棗人參甘草治噦逆橘皮茯苓生薑湯即橘皮湯加茯苓炙甘草一法加乾葛神麯半夏治咳逆解酒毒止嘔吐一方無半夏為細末煉蜜丸如彈子大名大橘皮丸大橘皮湯即橘皮湯加人參甘草理氣調中橘皮半夏湯即橘皮湯加半夏治積氣痰痞不下飲食嘔吐不止芩連二陳湯即二陳湯加黃芩黃連治熱痰丁香二陳湯即二陳湯加丁香藿香枳縮二涉湯即二陳湯去陳皮甘草加枳殼砂仁倍術二陳湯即本方加白朮治脾胃中有濕痰以致泄瀉竹茹二陳湯即本方加竹茹治胸中有熱膈上有痰嘔吐不已姜煎白朮湯即二陳去橘紅加白朮檳榔治胃中虛損及吐痰二術二陳湯即本方加白朮蒼朮治嘔吐清水如注不已潤下丸即二陳去半夏茯苓治上而痰吐下而痰瀉製法以橘紅二斤鹽水洗甘草二兩炙為丸加味二陳湯即本方加蒼朮枳殼薑黃薑棗煎治酒面積熱成痰手臂痛並痰攻眼腫及身麻痹二陳木通湯即本方加木通滑石人參蘆治關格飲食不下二便不通桂附二陳湯即本方加官桂附子薑棗煎治寒瘧但寒少熱多腰足冷麥冬二陳湯即本方加麥冬白朮當歸黃芩治婦人肺火咳嗽嘔吐痰飲白龍湯即二陳去陳皮甘草加礬治酒積有痰香橘湯即二陳去茯苓加炒香附薑棗煎治七情所傷中腕不快痰氣導痰湯即二陳湯加枳殼南星生薑治風痰飲癖上攻頭目發作無時者順氣導痰湯即導痰湯加烏藥香附木香煎好入薑汁沉香服芩連導痰湯即導痰湯加黃芩黃連煎服祛風導痰湯即導痰湯加防風羌活白朮煎好入竹瀝薑汁服寧神導痰湯即本方加芩連遠志石菖蒲煎好入砂仁末三分竹瀝薑汁服溫膽湯即二陳湯加枳實竹茹生薑治病後虛煩不得眠及膽虛驚悸滌痰湯即二陳湯加枳殼桔梗南星竹茹人參石菖蒲治中風痰迷心竅舌強不能言香橘飲即二陳湯加木香砂仁白朮治氣滯痰眩加味茯苓湯即二陳湯加人參益智香附治脾不攝涎痰迷心竅失事健忘茯苓半夏湯即二陳湯去甘草加麥芽神麯曰術天麻生薑煎複方清氣化痰丸即二陳湯合涼膈散清利頭目涼膈化痰清熱利氣藿香養胃湯即二陳湯合平胃散去茯苓加藿香治嘔吐八解散即二陳湯合平胃散與四君子湯去蒼朮加藿香治四時傷寒頭痛身熱惡風多汗嘔吐噁心咳嗽痰滿痞悶三黃湯治心下痞按之濡關上脈浮大黃二兩如丸春三兩夏秋二兩冬五兩黃連一兩如丸春四兩夏五兩秋三兩冬二兩黃芩一兩如丸春四兩夏秋六兩上三味以麻沸湯二升漬之須臾絞去滓分溫再服海藏云伊尹三黃湯無黃芩後人脫落之也丸服名金花丸又名三黃丸治脾熱口疳口氣黃疸吐血消渴羸瘦胃熱消穀易飢飲食不為肌肉三黃湯即三黃湯去大黃加黃柏三兩黃芩一兩治久痢一名三黃瀉心湯治心膈實熱狂燥面赤丸之名三補丸治脈痿二黃湯即古方三黃湯去黃柏加甘草治天行大頭疫病黃連解毒湯即古方三黃湯加梔子等分梔子金花丸即黃連解毒湯水泛為丸每服百丸茶下一名大金花丸大黃湯即解毒湯去黃芩加大黃等分療天行五六日不解頭痛壯熱四肢煩疼不欲飲食大黃黃連瀉心湯即三黃湯無黃芩林億云看詳大黃黃連瀉心湯諸本皆二味又後附子瀉心湯用大黃黃連黃芩附子恐是前方中亦有黃芩但加附子也故後云附子瀉心湯本方加附子也按成無己云內經曰火熱受邪心病生焉苦入心寒除熱大黃黃連之苦寒以導瀉心下之虛熱但以麻沸湯漬服者取其氣薄而泄虛熱也附子瀉心湯即前湯加附子治心下痞而復惡寒汗出者與瀉心湯攻痞加附子以固陽瀉心湯黃連一兩去須為極細末每服一字至半錢一錢海藏云易老單方瀉心湯出於此乃實邪實則瀉其子也地黃丸用黃連四兩為末生地黃半斤研取汁連滓拌黃連末和勻曬乾再為細末蜜丸桐子大門冬湯下三十丸治心熱安神丸即地黃丸加當歸甘草蒸餅丸如黍米大硃砂為衣津液下五十丸治虛煩不得眠既濟解毒湯即三黃湯加甘桔柴胡升麻連翹當歸治上熱頭目赤腫而痛胸膈煩悶不得安臥身半以下皆寒足胻尤甚大便微秘門冬丸即瀉心湯加麥門冬二兩去心為末蜜丸食後熟水下三十丸治心經有熱清心丸即門冬丸加黃柏二兩冰片一錢為末蜜丸臨臥薄荷湯下治熱黃連清膈丸即門冬丸加鼠尾黃芩三錢為末蜜丸如綠豆大溫湯下二十丸治心肺有熱及經中熱硃砂涼膈丸即大金花丸去黃芩黃柏加參苓冰片蜜丸梧子大硃砂為衣食後熟水下五七丸日三服治上焦虛熱肺腕咽膈有氣如煙搶上葛根黃芩黃連湯即三黃湯去大黃加葛根甘草治太陽桂枝證誤下利不止喘而汗出者表未解者散以葛根甘草之甘弱者堅以黃芩黃連之苦三黃熟艾湯即古方三黃湯加熟艾治傷寒四五日後大下熱痢諸藥不效者聚金丸即二黃湯加防風治小兒大便下血發熱煩燥腹中熱痛作渴脈弦數或驚熱目赤昏澀或有酒毒去血連柏二物湯即古方三黃湯去黃芩治黃疸梔子柏皮湯即解毒湯去黃連黃芩治燥熱發黃複方三黃石膏湯即黃連解毒湯合白虎湯加玄參一方加石膏麻黃豆豉無知母玄參治暑毒深入熱結在裡譫語煩渴不欲近衣大便秘結小便赤澀者解毒四物湯即黃連解毒湯合四物湯治經水不住解毒丸即解毒湯合神芎導水丸治中外諸熱毒癰腫瘡疽筋脈拘攣咬牙驚悸一切熱毒神芎導水丸方用大黃枯芩牽牛滑石等分滴水為丸加減瀉黃散即黃連解毒湯加茵陳澤瀉茯苓治大人小兒黃疸此藥退脾土復腎水降心火生地黃黃連湯即黃連解毒湯合四物湯去黃柏加防風治婦人血風證因大脫血崩漏或前後失血因而枯燥其熱不除循衣撮空摸床閉目不醒揚手擲足搖動不寧錯語失神脈弦浮而虛內躁熱之極也氣粗鼻乾而不潤上下通燥此為難治當服此藥若脈實者加大黃鬚審虛實甘草瀉心湯治狐惑狀如傷寒蝕於上部則聲喝此湯主之甘草四兩甘平半夏半升辛平黃連一兩苦寒黃芩三兩苦寒乾薑三兩辛熱人參三兩甘溫大棗十二枚擘甘溫上七味以水一斗煮取六升去滓再煎溫服一升日三服王海藏云伊尹湯液此湯也七味今監本無人參脫落之也宋林億等云又按千金外臺治傷寒䘌食用此方皆有人參故知脫落無疑成無己云辛人肺而散氣半夏之辛以散結氣苦人心而瀉熱黃連黃芩之苦以泄痞熱脾欲緩急食甘以緩之人參甘草大棗之甘以緩之也生薑瀉心湯即甘草