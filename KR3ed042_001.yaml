黃汁一升以泉水煎百合如前法取一升去滓內地黃汁煎取一升五合分溫再服中病勿更服大便常如漆治百合病不經吐下發汗病形如初者百合洗方以百合一升水一斗漬之一宿以洗身洗已食煮餅勿以鹽豉也治百合病一月不解變成渴者渴不瘥者用栝蔞根牡蠣煅等分為細末飲服方寸匕日三服百合滑石散百合一兩炙滑石三兩為散飲服方寸匕日三服當微利者止服熱則除治百合病變發熱者或云寒熱者百合栝蔞牡蠣湯百合栝蔞根牡蠣各等分為散湯服方寸匕日三服治百合病不瘥百合四君子湯即百合合四君子湯治老弱虛人不得眠又治解㑊尺脈緩澀尺主腹背緩為熱中澀為無血故解㑊而不可名之然熱不熱寒不寒弱不弱壯不壯寧不可名為之解㑊也惟百合一證與此比比相若百花膏百合款冬花等分為細末蜜丸如龍眼大每服一丸細嚼或噙化治喘嗽不已痰中有血百合散百合隨多少熬令黃色末之每飲服方寸匕日三服治百合病服中滿痛者千金用干百合為末溫水服二錢一日二服治耳聾耳痛百合膏用新百合四兩蜜和蒸軟時時含一片吞津治肺臟壅熱咳嗽者衛生易簡方用新百合搗汁和水飲之治肺病吐血亦可煮食百合湯用百合煮濃汁服一升治陰毒傷寒良此孫真人方也骨哽方用百合五兩研末蜜水調圍頸項包住不過三五次即下香薷飲治伏暑引飲口噪咽乾或吐或瀉並皆治之香薷去土八兩白扁豆微炒去殼四兩厚朴去皮薑汁炒四兩上三味㕮咀每服三錢水一盞入酒少許煎七分沉冷服之一方加黃連二兩薑汁炒令黃色名黃連香薷散如有搐溺加羌活煎服香薷湯即香薷飲加茯神四兩甘草二兩為末沸湯點服加鹽少許亦可十味香薷飲即香薷飲加異功散黃耆木瓜為末每服二錢熱湯或冷水調服消暑氣和脾胃六和湯即十味香薷飲去黃耆白朮陳皮加砂仁杏仁半夏藿香薑棗煎服治心脾不調氣不升降霍亂吐瀉寒熱交作傷寒陰陽不分冒暑伏熱煩悶或成痢疾中酒煩渴畏食香薷丸即香薷湯去厚朴扁豆加紫蘇木瓜藿香檀香丁香為細末蜜丸治大人小兒傷暑伏熱瞀悶昏眩一切暑病每服一二丸細嚼溫湯下枇杷葉散即香薷飲去扁豆加枇杷葉陳皮丁香木瓜茅根麥冬甘草為細末每服二錢生薑三片煎服或用井花水調下治中暑伏熱煩渴引飲嘔噦噁心頭目眩暈消暑十全散即香薷湯加紫蘇藿香檀香白朮木瓜生薑治伏暑胃氣不和心腹滿痛加味香薷飲即香薷湯合四苓散加芍藥陳皮黃連黃芩木瓜治暑瘧香薷煎用干香薷五十斤銼入釜中以水淹過三寸煮使氣力都盡去滓澄之微火煎至可丸桐子大一服五丸日三服漸增至小便利則愈治水病洪腫薷術丸用香薷葉一斤水一斗熬膏煩去滓再熬成膏加白朮末七兩和丸桐子大每服十丸米飲下治通身水腫李時珍曰世醫治暑概以香薷飲然暑有乘涼飲冷致陽氣為陰邪所遏遂病頭痛發熱惡寒煩燥口渴或吐或瀉或霍亂者宜用以發越陽氣散水和脾若飲食不節勞役作喪之人傷暑大熱大渴汗泄如雨煩燥喘促或瀉或吐乃勞倦內傷之症必用東垣清暑益氣湯人參白虎湯之類以瀉火益元可也若用香薷是重虛其表而又濟之以熱矣蓋香薷乃夏月解表之藥如冬月用麻黃氣虛者勿多服今人不知暑傷元氣概用代茶謂能闢暑真癡前說夢且性溫不可熱飲反致吐逆冷服則無拒格之患扁豆湯用香薷葉扁豆葉各一升木瓜一枚切乾薑一兩切以水六升煮取二升五合去滓分溫三服服別相去如人行六七里治霍亂吐利芎辛湯治頭風鼻塞聲重肩背拘急川芎半兩細辛二錢甘草一錢半上為粗末水煎去滓臨臥分二服一法加白芷辛夷甘菊治鼻出黃水濁涕不絕腦痛目昏一法以細辛二錢川芎白芷減半為細末搐入鼻中治頭痛芎辛湯即芎辛湯加附子川烏南星乾薑等分每服四錢姜五片芽茶少許水煎服治一切偏正頭痛不可忍者除發熱者不當服其餘痰厥飲厥腎厥等症只以此藥調鍾乳粉間服治頭痛緊捷之法無以逾此頭痛多用石膏取其能墜痰飲恐其性寒故以鍾乳代之白龍丸即芎辛湯加藁本白芷各等分為細末每藥四兩入煅過石膏半斤水丸每兩分作八丸薄荷清茶食後嚼下一丸治男婦一切風症遍身瘡癬手足頑麻偏正頭疼鼻塞腦悶大解傷寒頭風又治霧露之氣或發熱療風蛀牙疼用一丸分作三次乾擦後用鹽湯漱之更用蔥茶嚼下通關散即芎辛湯加撫芎川烏白芷為細末每服一錢蔥白茶清或薄荷湯調下治中風傷寒發熱惡風頭痛目眩鼻塞聲重肩背拘急身體痠疼肌肉瞤動牙關緊急久新頭風眼暗川芎丸即芎辛湯加防風薄荷桔梗為末煉蜜丸如芡實大食後臨臥茶清細嚼一丸消風壅化痰涎利咽膈清頭目治頭痛旋眩心忪煩熱頸項緊急肩背拘倦肢體煩疼皮膚瘙癢腦昏目疼鼻塞聲重面上遊風狀如蟲行五積散調中順氣除風冷化痰飲治脾胃宿冷腹肋脹痛胸膈停痰嘔逆噁心或外感風寒內傷生冷心腹痞悶頭目昏痛肩背拘急肢體怠惰寒熱往來飲食不進及婦人血氣不調心腹撮痛經候不調或閉不通麻黃去根節六兩肉桂去粗皮芍藥各三兩甘草炙三兩蒼朮米泔浸廿四兩厚朴去粗皮四兩陳皮去白六兩半夏湯洗七次茯苓各三兩枳殼去穰炒六兩桔梗去蘆頭十二兩川芎當歸去蘆各三兩乾薑炮四兩白芷三兩上除肉桂枳殼二味別為粗末外十三味同為粗末慢火炒令色轉攤冷次入桂枳殼末令勻每服三錢水一盞半入生薑三片煎至一盞去滓溫服按海藏五積論云麻黃桂芍藥甘草即麻黃桂枝各半湯也蒼朮甘草陳皮厚朴即平胃散枳殼桔梗陳皮茯苓半夏即枳桔二陳湯兼川芎當歸湯治血又加乾薑為厚朴散此數藥相合為解表溫中泄熱之劑去痰消痞調經之方雖為內寒外感表裡之分所制實非仲景表裡麻黃桂枝姜附之的方也至於冷積嘔吐泄痢癥瘕時疾疫氣項背拘急加蔥自豆豉厥逆加吳茱萸寒熱咳逆加棗婦人難產加醋始知用之非一途也惟知活法者擇之大羌活湯一名九味羌活湯一名沖和湯治傷寒脈浮緊傷風脈浮緩並解兩感惡候羌活防風蒼朮各一錢五分細辛五分川芎白芷生地黃黃芩甘草各一錢上水二鍾煎八分陶節庵捶法用生薑三片棗二枚煎一鍾加蔥白搗汁五匙入藥再煎一二沸食後溫服被覆取微汁為度如無汗啖熱稀粥助之煉蜜作丸服尤妙按潔古云有汗不得服麻黃無汗不得服桂枝若未瘥其變不可勝言故立此法不犯三陽禁忌解表神方海藏云傷寒得傷風脈傷風得傷寒脈故仲景有大青龍之劑及汗出過多戒不可服有筋惕肉瞤之證許學士諄諄以此則知麻黃桂枝不可輕用及韓氏又有桂枝之戒至楊氏明理特有五見脈體非精於持診者未易能也先師潔古老人博採眾方別立此法無問有汗無汗中風中寒悉治使喜溫者去五積之變熱好涼者除雙解之變寒雖市夫農子用而無失羌活散即本方去蒼朮白芷生地加前胡麻黃白茯苓蔓荊子枳殼石膏菊花治風氣不調頭目昏眩痰涎壅滯遍身拘急風邪寒壅頭痛項強鼻塞聲重肢節煩疼天陰風雨預覺不安羌活地黃各半湯即大羌活湯同生地黃等分解利兩感傷寒有神詳說見難知加減沖和湯即大羌活湯去蒼朮細辛加白朮黃耆治頭痛發熱惡風自汗脈浮緩者神術湯即大羌活湯加石膏知母治夏月感冒風邪羌活愈風湯即大羌活湯合羌活散及十全大補湯去白朮加地骨皮防己柴胡獨活薄荷知母秦艽枸杞杜仲半夏厚朴共三十三味內芩苓各三錢生蒼石芍各四錢桂一錢余各二錢和均每服一兩水二鍾煎一鍾溫服天陰加生薑三片療肝腎虛筋骨弱語言難精神憒是中風濕熱內弱者是以風熱體重也或瘦或肥偏枯不遂或恐而健忘或喜而多思皆精不足也此藥能安心養神調和陰陽香蘇散治四時感冒風邪頭痛發熱者及瘟疫傷寒紫蘇香附醋製去毛各二兩陳皮去白一兩甘草半兩上四味為粗末每服三錢水一盞煎至七分去滓熱服不拘時候日三服若作細末只服二錢入鹽點服如頭痛加川芎白芷各一兩愚按太平惠民局方云昔有白髮老人授此方與一富人家其家合施當大疫城中病者皆愈其後疫鬼問富人富人以實告鬼曰此老教三人矣稽顙而退內經曰辛甘發散為陽又曰風淫所勝平以辛佐以苦甘香附味辛苦甘辛能散苦能降甘能和且香而能竄能輔正除邪故以為君紫蘇辛溫能散風寒而發表陳皮辛溫能下氣燥濕甘草甘平能和中輔正所以治瘟疫四時不正之氣也芎蘇散用枳殼二陳湯加川芎紫蘇柴胡乾葛治頭痛發熱惡寒咳嗽吐痰氣洶參蘇飲用芎蘇飲去川芎柴胡加人參前胡木香治感冒風邪發熱頭痛咳嗽聲重涕唾稠黏此藥大解肌熱快膈十味和解散用白朮一錢半桔梗去蘆人參去蘆甘草炙陳皮去白枳殼去穰麩炒赤芍藥厚朴薑製當歸各一錢防風去蘆七分上㕮咀作一服用水一鍾生薑三片蔥白三根煎至一鐘不拘時服治感冒風寒頭疼發熱發散風邪蔥豉湯療傷寒有數種庸人不能分別今取一藥兼療者若初覺頭痛身熱脈洪起一二日者服之蔥白一虎口一用十四莖豉一升綿裹上二味以水三升煮取一升頓服取汗若汗不出加葛根三兩一方更加升麻三兩水五升煮取二升分溫再服徐徐服亦得必得汗即瘥若不得汗更作加麻黃三兩去節服取汗出為效一方用蔥白二兩半豉半斤一方用蔥白一握米三合豉一升先以水一斗煮米少時下豉後內蔥白令大熟取三升分溫三服則出汗葛根豆豉湯用葛根四兩以水一斗煮取三升內豉一升更煮取一升半分溫再服取汗為瘥一方搗生葛根汁一二升服亦佳鹽豉湯用豉三升綿裹鹽一兩以水七升煮取二升半去滓內蜜一升大煮三沸頓服一升安臥當吐如不吐更服一升取吐為效療傷寒汗出不歇已三四日胸中惡欲令吐者葛根蔥豉湯用葛根半斤烏梅十四枚蔥白一握豉一分綿裹上四味切以水九升煮取三升分為三服初一服便厚覆取汗汗出粉之療傷寒一日至三日應汗者梔子湯用梔子黃芩各三兩豉一升熬綿裹蔥白切一升石膏四兩碎綿裹乾薑四兩切以水七升煮取二升六合去滓分溫三服如人行八九里再服忌酒面生冷等物主天行一二日頭痛壯熱心中熱者豉尿湯用豉一升蔥白切一升童便三升先熬豉及蔥白令相得則投童便煮取一升澄清及熱頓服或汗或利但瘥則止如未更進一劑頻用有效療天行熱氣頭痛骨肉痠疼壯熱若初病一日在毛髮二日在皮膚三日在肌肉未得取利宜服此柴胡湯用麻黃二兩去節柴胡三兩黃芩三兩甘草二兩炙石膏五兩碎綿裹乾葛三兩蔥白根切一升勿留青處青即熱白即冷一作桑根皮豉七合綿裹三沸去之以水九升宿漬藥明旦先煮麻黃令沸掠去沫後並諸藥煮取一升七合分三服服相別去三食頃良久覆取汗出以粉拭之惡寒者加桂心忌莧菜生蔥生菜野豬肉蘆筍解肌葛根五物飲葛根切五合蔥白切一升生薑切一合豉一升帛裹粳米二合研碎以水五升煮取豉以上四味取三升半汁去滓內粳米屑煮令米爛帶熱頓服候盡微覆取汗無所忌柴胡湯用升麻六分柴胡八分芍藥六分甘草五分石膏十二分碎麥門冬去心蔥白半分香豉六分帛裹生薑六分竹葉洗切八升以水九升煮取二升半絞去滓分溫三服服別如人行六七里頃進一服不吐不利瘥忌海藻菘菜熱面油膩鼠屎湯用雄鼠屎三七枚熬未湯成下乾葛二兩梔子十四枚擘蔥白切一升豉八合以水三升煮取一升七合去滓內鼠屎末分溫二服服別相去如人行六七里微汗內消不利療患天行熱氣瘥後勞發頭痛如初病者七味蔥白湯用蔥白生薑鹽豉葛根麥門冬乾地黃等分用水一杓揚之無數名曰澇水以煎前藥三分去二去滓分作二服覆首出汗許仁則云傷寒或因氣勞或因力勞或因食勞此方主之其病如強力持重行步而發者力勞也蔥白姜蕤五味飲用葳蕤五兩蔥白一升豉一升帛裹粳米三合研碎雄鼠屎七枚末之以水七升先煮三味取汁四升去滓內粳米屑煮米熟訖內鼠屎末攪調頓服覆被安臥取汗瘥療天行瘥後勞發服蔥白七味飲未愈者連須蔥白湯用蔥白連須半斤生薑二兩以水二升煮取一升去滓分二三服治傷寒發汗未已頭疼如破者如不瘥用後葛根蔥白湯蔥薑湯用蔥白十莖生薑三片以水三升煎取一升分三服取汗為度治妊娠傷寒葛根蔥白湯即蔥薑湯加葛根芍藥川芎知母以水三升煮取一升去滓分二服治詳連須蔥白湯下麻黃葛根蔥豉湯即蔥豉湯加麻黃葛根水煮麻黃去沫次下葛根煎二十沸次下豉次下蔥白煎成去滓溫服少時以蔥醋粥投之覆衣取汗治傷寒二三日頭項腰脊痛惡寒脈浮而緊者分兩隨症定奪枳實湯用枳實三枚炙梔子十四枚擘蔥白切一升香豉半升鼠屎二七枚以水一升煎取二升五合分溫三服服別相去如人行六七里又服內消不利療患數日復勞發者蔥白一物湯用蔥白二把煎湯服取汗愚按傷寒法仲景此萬古不易之論也但其言簡奧淺識不能探賾後世潔古乃立九味羌活湯自謂不犯三陽禁忌解表神方然投之徒使汗出淋漓其病不解不若蔥豉蔥姜等湯最為穩當且便於窮鄉僻壤不可以其易而思之
