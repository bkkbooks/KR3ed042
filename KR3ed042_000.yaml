body:
  text: 祖齊小敘玄晏先生曰仲景廣伊尹湯液用之多驗成聊攝謂自古諸方歷歲浸遠難可考詳惟仲景之書最為群方之祖要之仲景本伊尹之法伊尹本神農之經軒岐靈素大聖之所作也其於處劑之法則曰君一臣二制之小也君二臣四制之大也經中如麋銜術澤湯烏側魚散半夏湯雞屎醴等方多不過三四味即後許胤宗亦謂古人用藥簡要精專故仲景之方其藥品甚少後至潔古東垣立方有多至三十餘味者説者謂東垣如韓信將兵多多益善他人效之則未免廣絡原野之譏矣茲所集首冠素靈二方次載伊尹湯液一方以為宗而浚悉以仲景之方為祖其局方二陳四物四君子等湯以類附焉若東垣之補中益氣丹溪之越鞠等劑誠發前人之所未發雖曰自我作古可也近代醫書如戴元禮之證治要訣薛新甫之明醫雜著方皆簡略與仲景之意不大紕繆故多采之要之方者仿也醫者意也自仲景而本之伊尹由伊尹而上溯軒農其於方劑之道庶幾焉近之矣崇禎庚辰歲重陽日元無子施沛題
