body:
  text: 卷之二梔子豉湯治汗吐下後虛煩不得眠心中懊憹及發汗若下之而煩熱胸中窒者傷寒五六日大下之身熱不去心中結痛者又治陽明病下之其外有熱手足溫不結胸心中懊憹不能食但頭汗出者梔子十四枚擘苦寒香豉四合綿裹苦寒上二味以水四升先煮梔子得二升半內豉煮取一升半去滓分為二服溫進一服得吐則止後服按成無己云內經曰其高者因而越之其下者引而竭之中滿者瀉之於內其有邪者漬形以為汗其在皮者汗而發之治傷寒之妙雖有變通終不越此數法也傷寒邪氣自表傳裡留於胸中邪在高分則可吐之是越之之法然吐症亦自不同如未經汗下實邪蘊郁謂之膈實宜瓜蒂散乃吐胸中實邪也若發汗吐下邪氣乘虛留於胸中謂之虛煩宜用梔子豉湯乃吐胸中虛邪也又曰酸苦湧泄為陰苦以湧吐寒以勝熱梔子香豉相合而為吐劑宜矣又曰凡用梔子湯病人舊微溏者不可服梔子甘草豉湯即梔子豉湯加甘草二兩治症同前而少氣者蓋少氣則氣為熱搏散而不收者甘以補之也梔子生薑豉湯即梔子豉湯加生薑五兩治證同前而嘔者蓋嘔則氣為熱搏逆而不散者辛以散之也梔子厚朴湯即梔子豉湯去豉加厚朴四兩姜炙枳實四枚去穰炙令黃治傷寒下後心煩腹滿臥起不安者蓋用梔子之苦以湧虛煩枳朴之苦以泄腹滿也梔子乾薑湯即梔子豉湯去豉加乾薑二兩治傷寒醫以圓藥大下之身熱不去微煩者蓋用乾薑之辛熱以復正氣也梔子柏皮湯即梔子豉湯去豉加炙甘草黃柏各一兩治傷寒身黃髮熱者梔子大黃湯即梔子豉湯增豉六合加大黃一兩枳實五枚治酒黃疸心中懊憹或熱痛大黃硝石湯即梔子柏皮湯去甘草增黃柏加大黃硝石各四兩治黃疸腹滿小便不利而赤自汗出此為表和裡實當下之茵陳蒿湯用梔子鼓湯去谷加茵陳蒿六兩大黃二兩治谷疸之為病寒熱不食食即頭眩心胸不安久久發黃為谷疸又治陽明病但頭汗出身無汗劑頸而還身必發黃傷寒七八日身黃如橘子色小便不利腹微滿者成無己云小熱之氣涼以和之大熱之氣寒以取之茵陳梔子之苦寒以逐胃燥大黃之苦寒以下疹熱瓜蒂散治病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之瓜蒂一分熬黃苦寒赤小豆一分酸溫上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與服按成無己雲華他曰四日在胸則可吐之此迎而奪之之法也千金方曰氣浮上部填塞心胸胸中滿者吐之則愈此隨證治之之法也大約傷寒四五日邪氣客於胸中之時也加之胸中煩滿氣上衝咽喉不得息者則為吐證具乃可投諸吐藥而萬全之功有之矣又云其高者越之越以瓜蒂香豉之苦在上者湧之湧以赤小豆之酸內經曰酸苦湧泄為陰一物瓜蒂散即前方止用瓜蒂二七個以水一升煎取五合去滓頓服治太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也又治傷寒三四日者或覺心滿堅硬腳手心但熱變黃不治而欲死者用瓜蒂為細末每用一字吹鼻令黃水出余殘末水調服之得嘔黃水一二升乃愈㗜鼻瓜蒂散用瓜蒂十四個丁香一個黍米四十九粒為細末噙水取一字㗜鼻下黃涎按衍義云瓜蒂即甜瓜蒂也瓜蒂成熟自落其蒂在蔓莖上採得曝乾不拘多少為細末量病輕重每服一二錢匕膩粉一錢匕以水半合調勻灌之又治偏正頭痛久不愈服諸藥及針刺不效者以其濕在頭也瓜蒂一味為細末以少許㗜之鼻中清水徐徐出一晝夜濕盡痛止為度此亦吐之意也經云濕氣在上以苦吐之故邪在胸中者服之邪在頭目者㗜之皆吐之屬也張子和云點目出淚㗜鼻瀝涕口食漉涎皆有以同乎吐也問古今吐法不一在胸中者或㗜之在頭者或吐之何也答曰頭為天之天肺為天之地鼻為肺之竅胸為肺之腑總而言之皆在心君之上無形之神至高之分故用之錯而效之同也又治小兒久患風癇纏喉風痹及大人風涎潮熱發則不省人事酒積食勞黃疸脾濕腫滿勞熱上喘肌熱咳嗽中滿眩暈膈實痰飲痰厥頭痛一切胸上病患脈沉實按之有力者並約量劑料輕重多少服之服之良久涎自出矣如涎不出含砂糖一塊下咽則涎出此物甚不損人全勝石碌硇砂等藥用諸瓜蒂藥吐不止者以麝香湯解之勝金丸用生薄荷半兩豬牙皂角二兩捶碎水一升二味一處浸取汁研成膏瓜蒂末一兩藜蘆二兩硃砂半兩將膏子搜和丸如龍眼大以硃砂為衣溫酒化下一丸甚者二丸以吐為度得吐即醒不醒不可救或謂中風無吐法引金虎碧霞為戒且如卒暴涎生聲如引鋸牙關緊急氣閉不行湯藥不能入命在須臾執以無吐法可乎但不當用銀粉藥恐損脾壞人四肢耳羅謙甫方有粉霜鉛粉無藜蘆治法同瓜蒂散用瓜蒂七十五個赤小豆七十五粒人參去蘆五分甘草生用二錢五分治痰飲酒積食勞留飲停滯或寒結胸中熱鬱所化三聖散用防風三兩瓜蒂三兩藜蘆一兩或五錢治痰涎壅盛用此吐之以吐為度不必盡劑宜靜室暖不透風處用吐至以好醋蔥湯解之瓜蒂散用瓜蒂丁香各七枚小豆為末黑豆許於鼻少時黃水出瘥治身面四肢浮腫殺蟲去鼻中息肉陰黃黃疸及暴急黃瓜蒂散用苦參二分甘草一分半瓜蒂二十枚赤豆二七粒療傷寒汗出不渴三四日胸中惡欲吐者當吐不止作蔥豉汁解之忌海藻松菜赤小豆茯苓湯用赤小豆三十枚茯苓六銖瓜蒂四銖雄黃二銖甘草五銖炙栝蔞四銖用水三升先煮小豆茯苓取汁八合合後四藥搗為散取前汁調半錢匕適寒溫服之須臾當吐則愈治黑疸身體大小便正黑一方云療久黃疸瓜蒂散用瓜蒂三分赤小豆四分熬雄黃四兩研搗篩為散空心溫漿水服一錢匕半當吐止不吐加至二錢匕寮卒中惡心腹絞刺痛氣急脹奄奄欲絶調胃承氣湯陽明病不吐不下心煩者大黃四兩去皮清酒浸苦寒甘草二兩炙甘平芒硝半升鹹苦大寒上三味㕮咀以水三升煮取一升去滓內芒硝更上火微煮令沸少少溫服之成無己曰熱淫於內治以鹹寒佐以苦甘芒硝鹹寒以除熱大黃苦寒以蕩實甘草甘平助二物推陳而緩中又曰承氣湯中用甘草恐其暴下也大承氣湯陽明病脈遲汗出不惡寒身重短氣腹滿潮熱大便硬者大黃四兩酒洗苦寒厚朴半斤炙去皮苦溫枳實五枚炙苦寒芒硝三合鹹寒上四味以水一斗先煮二物取五升去滓內大黃更煮取二升去滓內芒硝更上微火一兩沸分溫再服得下余勿服成無己曰內經曰燥淫所勝以苦下之大黃枳實之苦以潤燥除熱又曰燥淫於內治以苦溫厚朴之苦下結燥又曰熱淫所勝治以鹹寒芒硝之咸以攻蘊熱小承氣湯即大承氣湯去芒硝減厚朴六兩枳實二枚大熱結實者與大承氣湯小熱微結者與小承氣湯以熱不大甚故去芒硝又以結不至堅故減厚朴枳實也一名順氣湯一名三物厚朴湯成無己曰承順也傷寒入胃胃氣鬱滯糟粕祕結壅而為實是正氣不得舒順也湯以蕩滌實邪使正氣得以舒順是以承氣名之又曰承氣湯下藥也用之尤宜審焉審知大實大滿堅有燥屎乃可投之也如非大滿則生寒熱而病不除況無滿實者而或妄投之則結胸痞氣之病生矣故曰傷寒有承氣之戒也按海藏云調胃承氣湯治實而不滿即正陽陽明是也大承氣湯治大滿大實即太陽陽明是也小承氣湯治實而微滿即少陽陽明是也太陽陽明正陽陽明為最高之分故大黃但用酒浸從巔而下之也惟少陽陽明為最下之分處三經之內故大黃不用酒浸也非若二經而高爾若最高之分用最下之藥則耳目昏冒咽頰腫痛神癡不清之病有不免矣若最下之分用最高之藥則胸中氣消日久不復虛損成勞之病有不免矣故仲景三承氣湯各有主治隨經而異即不同也又年老虛人傷寒可下者大承氣湯調胃承氣湯皆去硝慢火熬成玄明粉量輕重而下之桃仁承氣湯即大承氣湯減芒硝加桃仁一方去枳實厚朴加桂枝桃仁治傷寒熱毒入經結於五臟內有瘀積吐血下血及熱結膀胱其人如狂外解而小腹急痛者及血痢質實跌蹼損傷瘀血作痛等症三一承氣湯即大承氣湯加甘草治大承氣湯證腹滿實痛又治小承氣湯證內熱不便又治調胃承氣湯證譫語下利此湯合而為一故名三一承氣湯也六一順氣湯即大承氣湯加甘草黃芩芍藥柴胡以代大承氣小承氣調胃承氣三一承氣大陷胸大柴胡六湯故名六一順氣湯順即承也黃龍湯即大承氣湯加甘草人參當歸治心下硬痛下利純清水譫語發渴身熱者庸妄不識呼為漏底而用熱藥止之誤矣此因熱邪傳裡胃有燥屎名曰熱結利俗所謂傍流也三化湯即大承氣湯去芒硝加羌活治中風便溺阻隔邪氣內實者上焦滿治以厚朴中焦滿破以枳實下焦實奪以大黃用羌活者不離乎風也服後二便微行三焦氣化故曰三化麻仁丸即大承氣湯去芒硝加麻仁二升芍藥半斤杏仁一斤蜜丸服一名脾約丸一名潤腸丸治胃強脾弱不能運布津液濡潤大腸大便結燥者又治跌陽脈浮而澀小便數大便難為脾約者滌毒湯即大承氣湯去厚朴枳殼加甘草牛蒡當歸治時氣五發瘡瘍喉閉虐頭風等證厚朴七物湯即大承氣湯加生薑大棗桂甘草治腹痛脹滿大黃湯即調胃承氣湯加桃仁桂木通大腹皮治陽毒傷寒未解熱結在內恍惚如狂者大陷胸湯太陽病心中懊憹陽氣內陷心下因硬則為結胸傷寒六七日結胸熱實脈沉而緊心下痛者大黃六兩去皮苦寒芒硝一升鹹寒甘遂一錢匕苦寒上三味以水六升先煮大黃取二升去滓內芒硝煮一兩沸內甘遂末溫服一升得快利止後服成無己云大黃謂之將軍以苦蕩滌芒硝一名硝石以其咸能軟硬夫間有甘遂以通水也甘遂若夫間之遂其氣可以直達透結陷胸三物為允利藥之中此為翛劑傷寒錯惡結胸為甚非此湯則不能通利之劑大而數少取其迅疾分解結邪此奇方之制也靈樞曰結雖大猶可解也在傷寒之結又不能久非陷胸湯孰可解之大陷胸丸即大陷胸湯增大黃二兩減芒硝半升加葶藶杏仁各半升先搗大黃葶藶二味內杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法結胸證其脈浮大者不可下下之則死結胸證悉具煩躁者亦死十棗湯治太陽中風下利嘔逆表解乃可攻之芫花熬辛溫甘遂苦寒大戟苦寒各等分大棗十枚擘甘溫上三味各搗為散以水一升半先煮大棗肥者十枚取八合去滓內藥末強人服一錢匕羸人服半錢平旦溫服之若下少病不除者明日更服加半錢得快之後糜粥自養按成無己曰辛以散之芫花之辛以散飲苦以泄之甘遂大戟之苦以泄水水者腎所主也甘者脾之味也大棗之甘益土而勝水又云下嘔逆里受邪也邪在裡者可下亦須待表解乃可攻之其人漐漐汗出發作有時不惡寒者表已解也頭痛心下痞硬滿下脅下痛乾嘔短氣者邪熱內蓄而有伏飲是里未和也三花神祐丸即十棗湯加牽牛大黃輕粉水丸除濕丹即神祐丸加乳香沒藥玄青丹即神祐丸加黃連黃柏青黛元戎云以上四種藥極有毒不可輕試也趁痛丸即十棗湯去芫花加白芥子大麥面上三味藥為末拌和勻作餅慢火炒黃熟再為細末用大麥面一兩同上拌勻糊丸桐子大空心冷酒下十丸至十五丸明理趁痛丸無大戟治腳氣上攻風毒走注疼痛神效又治水氣浮腫舟車丸即神祐丸加青皮陳皮木香水丸白湯下七十丸控涎丹即十棗湯去芫花大棗加白芥子桃仁泥糊丸每服五七丸漸加至十丸薑湯下治一身及兩脅走痛痰挾死血者小胃丹即十棗湯去大棗加大黃黃柏水丸臨臥津液下二三十丸或白湯下製法詳準繩取膈上濕痰熱積以意消息之欲利空心服舟車神祐丸即舟車丸合神祐丸加檳榔取蟲加蕪荑為末水丸空心服五丸日三服河間依仲景十棗湯例製出此方主療一切水濕為病戴人云十棗泄諸水之上藥所謂溫藥下者是已如中滿腹脹喘嗽淋閉水氣蟲腫留飲癖積氣血壅滯不得宣通風熱燥郁肢體麻痹走注疼痛久新瘧痢等病婦人經痛帶下皆令按法治之病去如掃故賈同知稱為神仙之奇藥也按婁全善曰舟車祐丸乃河間所定初服五丸日三服如至快利後卻常服以病去為度設病愈後平人能常服保養宣通氣血消運飲食若病痞悶極甚者多服反煩渴不開轉加痛悶宜初服二丸每服加二丸加至快利為度以意消息小兒丸如麻子大隨強弱增損三四歲者三五丸依前法加減至戴人變為神芎丸神祕不傳然每令人夜臥先服百餘粒繼以濬川等物投之五更當下種種病出投下少末再服和膈藥須以利為度五日一下者三日一下者病輕者可一二度止重者五六度方愈是擒縱卷舒之妙臨證制宜非言可諭觀其藥雖峻急認病的確自非老手諳練有大負荷者焉敢見諸行事余每親制用之若合符節然又隨人強弱當依河間漸次進服強實之人依戴人治法行之神效大聖濬川散即神祐丸去芫花大戟大棗輕粉加郁李仁芒硝樓全善評曰此下諸積之聖藥也諸濕為土火熱能生濕土故夏熱則萬物濕潤秋涼則濕復燥乾溼病本不自生因干火熱怫鬱水液不能宣通停滯而生水濕也凡病濕者多自熱生而熱氣多為兼病內經云明知標本正行無問者是也夫濕在上者目黃而面浮在下者股膝腫厥在中者肢滿痞膈痿逆在陽不去者久則化氣在陰不去者久則成形世俗不詳內經所言留者攻之但執補燥之劑怫鬱轉加而病愈甚也法當求病之所在而為施治瀉實補虛除邪養正以平為期而已又嘗考戴人治法假如肝木乘脾土此土不勝木也不勝之氣尋救於子巳土能生庚金庚為大腸味辛者為金故大加生薑使伐肝木然不開脾土無由行也遂以舟車丸先通閉塞之路是先瀉其所不勝後以薑汁調濬川散大下之是瀉其所勝也戴人每言導水丸必用禹功散繼之舟車丸必以濬川散隨後如寒疝氣發動腰腳胯急痛者亦當下之以瀉其寒水世俗暗於治體一概鹵莽有當下而非其藥終致萎頓而已豈知巴豆可以下寒甘遂芫花可以下濕大黃芒硝可以下燥如是分經下藥兼食療之非守一方求其備也故戴人曰養生與攻疴本自不同今人以補劑療病宜乎不效也泄水丸即十棗湯加海帶海藻郁李仁續隨子商陸根水煮棗肉為丸如小豆大每服五十丸水下神芎導水丸用黃芩一兩黃連川芎薄荷各半兩大黃二兩滑石黑牽牛各四兩治勞瘵停濕二陽病熱鬱河間制治一切熱證其功不可盡述設或久病熱鬱無問瘦痿老弱並一切證可下者始自十丸以為度常服此藥除腸胃積滯不傷和氣推陳致新得利便快並無藥燥搔擾亦不困倦虛損遂病人心意或熱甚必急須下者使服四五十丸未效再服以意消息常服二三十丸不動臟腑有益無損或婦人血病下惡物加桂半兩病微者常服甚者取利因而結滯開通惡物自下也凡老弱虛人脾胃經虛風熱所郁色黑齒稿身瘦痿黃或服甘熱過度成三消等病若熱甚於外則肢體躁擾病於內則神志躁動怫鬱不開變生諸證皆令服之惟臟腑滑泄者或裡寒脈遲者或婦人經病産後血下不止及孕婦等不宜服導水丸大黃黃芩各二兩滑石牽牛頭末各四兩為細末滴水丸梧桐子大每服五十丸加至百丸臨臥溫水服治濕熱腰痛泄水濕腫滿加減法加朴硝一兩退熱散腫毒止痛加白芥子一兩去遍身走注疼痛加郁李仁一兩散結滯通關節潤腸胃行滯氣通血脈加甘遂一兩去濕熱腰痛泄水濕腫滿久病加樟柳根一兩去腰腿沉重禹功散黑牽牛頭末四兩茴香一兩炒或加木香一兩上為細末以生薑自然汁調一二錢臨臥服加味控涎丸即神祐丸去大黃輕粉加苦葶藶巴豆水丸如粟米大每服三丸茶清下治風熱上攻壅盛中脘停痰留飲喘急四肢浮腫腳氣入腹及腹中諸氣結聚服之得利即效甘遂半夏湯用甘遂大者三枚半夏十二枚以水一升煮取半升去滓芍藥五枚甘草如指大一枚炙上四味以水二升煮取半升去滓以蜜半升和藥汁煎取八合頓服之治病者脈伏其人欲自利利反快雖利心下續堅滿此為留飲欲去疏鑿飲子用澤瀉赤小豆炒商陸羌活大腹皮椒目木通秦艽檳榔茯苓皮以上各一錢治水氣通身浮腫喘呼氣急煩躁多渴大小便不利服熱藥不得者神助散用黑牽牛炒取頭末澤瀉各二錢豬苓椒目各二錢五分葶藶五錢治十種水氣面目四肢浮腫以手按之隨手而起咳嗽喘急不得安臥小便赤澀大便難牡蠣澤瀉散治人病瘥後從腰以下有水氣者牡蠣澤瀉蜀漆洗去星栝蔞根葶藶子商陸根熬海藻洗去咸各等分上七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服日三牡蠣湯用牡蠣四兩熬蜀漆三兩麻黃四兩甘草二兩以水八升先煮蜀漆麻黃去上沫得六升內諸藥煮取二升溫服一升若吐則勿更服治牡瘧蜀漆散用蜀漆洗去腥雲母燒二日夜龍骨等分杵為末治牡瘧多寒者未發前以漿水服半錢溫瘧加蜀漆半分臨發時服一錢匕蜀漆丸用蜀漆知母升麻白薇地骨皮麥門冬各五分烏梅肉鱉甲炙葳蕤各四分石膏八分甘草三分炙常山六分豆豉一合熬搗篩為末蜜和丸如梧子大飲下十丸日再服加至二十丸此方用無不瘥加光明硃砂一兩神良治嶺南瘴氣乍熱乍寒積勞似瘧皆主之兼治痎瘧連年不瘥忌海藻菘菜莧菜生蔥生菜蜀漆丸用蜀漆青術香升麻鱉甲炙牡蠣熬硃砂研豬苓香豉各四分常山大黃各八分為末蜜和丸梧子大米湯下寸二丸日二服漸漸瘥至平復止治瘴瘧不瘥蠲痹湯治冷痹手足腰痛沉重及身體煩疼背項拘急黃耆蜜炙防風去蘆羌活赤芍藥酒炒薑黃炒當歸酒洗各二錢五分甘草炙五分上作一服用水二鍾生薑五片棗二枚煎至一鍾食前服一方無防風愚按風寒濕三者合而成痹又曰邪之所湊其氣必虛榮氣虛則不仁衛氣虛則不用故用黃耆以實衛當歸以調榮羌活驅風薑黃療痹赤芍藥和肝甘草和脾黃耆畏防風得防風而功愈大乃相畏而相使也舒經湯即蠲痹湯無黃耆防風有白朮海銅皮生薑水煎去滓入沉香汁少許食前服治臂痛不能舉有人常苦左臂痛或以為飲或以為風為濕諸藥悉投繼以針灸俱不得效用此方而愈蓋是氣血凝滯經絡不行所致非風非濕腰以下食前服腰以上食後服五痹湯用片薑黃羌活白朮防己各二錢半甘草炙一錢上作一服水二鍾生薑七片煎至一錢病在上食後服病在下食前服治風寒濕之氣客留肌體手足緩弱麻痹不仁防己黃耆湯治風濕脈浮身重汗出惡風者防己一兩甘草半兩炒白朮七錢半黃耆一兩一分去蘆上銼麻豆大每抄五錢匕生薑四片大棗一枚水一盞半煎八分去滓溫服良久再服喘者加麻黃半兩胃中不和者加芍藥三分氣上衝者加桂枝二分下有陳寒者加細辛三分服後當如蟲行皮中從腰下如冰後坐被上又以一被繞腰下溫令徹汗瘥防己茯苓湯即防己黃耆湯去白朮加桂枝茯苓以水六升煮取二升分溫三服治皮水為痛四肢腫水氣在皮膚中四肢聶聶動者防己地黃湯用防己一分桂枝三分防風三分甘草一分以酒一杯漬之一宿絞取汁生地黃二斤㕮咀蒸之如斗米飯久以銅器盛其汁更絞地黃汁和分再服治病如狂妄行獨語不休無寒熱其脈浮者木防己湯用木防己三兩石膏十二枚雞子大桂枝二兩人參四兩以水六升煮取二升分溫再服治膈間有支飲其人喘滿心下痞堅面免黑裡其脈沉緊得之數十日醫吐下之不愈此湯主之虛者即愈實者三日復發復與不愈者宜後加茯苓芒硝湯木防己加茯苓芒硝湯用木防己桂枝各二兩人參茯苓各四兩芒硝三合以水六升煮取二升去滓內芒硝再微煎分溫再服微利則愈防己椒目葶藶大黃丸用防己椒目葶藶大黃各一兩末之蜜丸如梧子大先食飲服一丸日三服稍增口中有津液渴者加芒硝半兩治腹滿口舌乾燥此腸間有水氣此方主之瀉肺湯用葶藶熬令黃色搗丸如彈子大大棗十二枚先以水三升煮棗取二升去棗內葶藶煮取一升頓服治肺癰喘不得臥者葶藶丸用甜葶藶隔紙炒栝蔞仁杏仁湯浸去皮尖炒漢防己各一兩上為細末煉蜜搗一二百杵丸如桐子大每服三十丸食前赤茯苓煎湯下日三四服治消渴後成水病浮腫一方無栝蔞仁有貝母木通各一兩治肺氣喘咳面目浮腫便赤沉香琥珀丸用琥珀杏仁去皮尖紫蘇赤茯苓澤瀉各半兩葶藶炒郁李仁去皮沉香各一兩半陳皮去白防己各七錢半上為細末煉蜜為丸如桐子大以麝香為衣每服二十五丸加至五十丸空心人參煎湯送下量虛實加減治水腫一切急難證小便不通常山湯療瘧常山三兩上一味以漿水三升浸經一宿煎取一升臨發前頓服之微吐瘥常山散用常山五分升麻蜀漆各一分搗篩為散每服二錢匕和井花水煮米半合頓服少間則吐吐訖則瘥療瘧常山桂心丸用常山桂心大黃甘草炙各四分為末蜜和平旦服如兔屎大每欲發服五六丸飲下之欲服藥先進少熱粥治瘧神良方忌生菜生蔥海藻常山丸用常山青木香各四分知母六分牡蠣熬豉鱉甲炙各二分蜀漆麻黃大黃烏梅肉丹砂各一分搗篩蜜丸梧子大未發時服五丸粥飲下微吐後任食如未愈更服十丸療瘧忌生菜蔥莧及生血物油膩療瘧丸用常山三兩知母四分甘草三分炙為末蜜丸梧子大未發前服十五丸常山酒用常山一兩獨蒜頭一顆切糯米一百粒烏豆一百粒清酒一升未發前一日以酒浸藥於碗中紙覆碗上橫一刀欲發時飲三分之一未吐再服吐即瘥烏梅丸用烏梅肉一兩常山二兩鱉甲二兩炙香豉蜀漆人參蓯蓉桂心知母桃仁去皮尖搗篩蜜丸梧子大空心酒飲下三十丸療瘧無問瘴痰諸瘧悉治皂莢丸治咳逆上氣時時唾濁但坐不得眠者皂莢八兩刮去皮用酥炙上一味末之蜜丸梧子大以棗膏和湯服三丸日三夜一服稀涎散用白明礬一兩豬牙皂角四條去黑皮上二味為末治中風卒倒昏悶涎潮搐搦水調灌下得吐涎妙一方用明礬一兩化開將江子仁六粒每粒分作兩半牙皂三錢切片入礬中攪勻待礬枯為末治中風不語牙關緊急單蛾雙蛾每用三分吹入諸病皆愈痰涎壅盛者以五分燈心湯下喉中之痰逆上者即吐膈間者即下一方用江子二粒去皮膜白礬拇指大一塊為末將二味在新瓦上煅令江子焦赤為度煉蜜丸如芡實大每服一丸用綿裹敢患人口中近喉處良久吐痰立愈治急中風口閉涎上垂死者一服即瘥碧雲散用青礬明淨者七錢巴豆一粒去殼研以礬為末瓦上溶化入巴豆在內候礬干為度細研每用一字以竹管吹入喉咽中涎去為效治咽喉諸證黑龍膏用皂莢四十挺切水三斗浸一夜煎鬥半入人參末半兩甘草末一兩煎五升去滓入無灰酒一升釜煤二匕煎如餳入瓶埋地中一夜每溫酒化下一匙取惡涎盡為度後含甘草片治九種喉痹急喉痹纏喉風結喉爛木舌飛絲入口等證抵當湯治太陽病六七日表證在脈微沉不結胸其人發狂以熱在下焦小腹滿小便自利者下血乃愈又治太陽病身黃脈沉結小腹硬小便自利其人如狂者血證諦也水蛭三十個熬鹹苦寒虻蟲三十個熬去翅足苦微寒桃仁二十個去皮尖苦甘平大黃三兩酒浸苦寒上四味以水五升煮取三升去滓溫服一升不下再服成無己曰人之所有者氣與血也氣為陽陽病易治氣塞而不行者猶易散血為陰陰病難治血畜而不行者則難散血畜於下非大毒駛劑則不能當而抵之又曰苦走血咸勝血虻蟲水蛭之鹹苦以除畜血甘緩結苦泄熱桃仁大黃之苦以下結熱抵當丸即抵當湯減水蛭十個虻蟲桃仁各減五個大黃增一兩杵搗分為四丸以水一升煮一丸取七合服之睟時當下血若不下者更服治傷寒有熱少腹滿應小便不利今反利者為有血也當下之大黃䗪蟲丸即抵當丸加䗪蟲蠐螬乾漆乾地黃芍藥杏仁黃芩甘草為末煉蜜丸小豆大酒飲服五丸日三服治五勞虛極羸瘦腹滿不能飲食食傷憂傷房室傷飢傷勞傷經絡營衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛沒藥散用虻蟲一錢去足翅炒水蛭一錢炒麝香一錢沒藥三錢為細末煎四物加鬼箭紅花玄胡索湯調服治血暈血結血聚於胸中或偏於少腹或連於脅肋服後血下痛止只服湯藥白散與小陷胸治證相同桔梗三分辛苦微溫貝母三分辛苦平巴豆一分去皮心熬黑研如脂辛溫上先以二味為散內巴豆更於臼中杵之以白飲和服強人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯外臺名桔梗白散治咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰也三物備急丸用巴豆去皮心熬另研如脂大黃乾薑各一兩三物須精新者先搗大黃乾薑為末研巴豆內中合治一千杵蜜丸密器貯之莫令泄氣主治心腹諸卒暴百病若中惡客忤心腹脹滿卒痛如錐刺氣急口噤停尸卒咳者以暖水苦酒服大豆許三四丸或不下捧頭起灌令下咽須臾當瘥如未瘥更與三丸當腹中鳴即吐下便瘥若口禁亦須折齒灌之千金云司空裴秀為散用亦可先和成汁乃傾口中令從齒間得入神應丸用巴豆一百十粒面一斤同炒盡油連曲一處為細末醋糊丸緑豆大冷水下一二十丸治心腹脹滿宿食不消飲食所傷不喜飲食諸藥不效青蛾丸即神應丸加青黛等分白礬倍蒸餅丸如緑豆大甘草湯下二丸治喘嗽上熱紅粉丸一名軟紅丸用杏仁二十個巴豆四個不去皮乾胭脂十個水丸緑豆大生薑湯下三丸治婦人血不通及心痛一法加硃砂解毒雄黃丸用巴豆七個去皮油雄黃鬱金各一分醋糊丸緑豆大熱茶下七丸治纏喉風急喉閉卒倒失音不語不省人事吐出頑痰立便蘇省未吐再服如至死者心頭猶熱口禁不下即以鐵匙斡開或折齒灌之藥下咽喉無有不活微吐泄不妨及上膈壅熱痰涎不利咽喉腫滿目赤癰腫一切熱毒並宜服之小兒喉腫痛驚熱痰涎壅塞服二丸或三丸量大小加減三五粒量虛實加減溫水吞下不拘時候常服進飲食消酒毒令人不中酒又治小兒脾胃虛弱纍有傷滯糞白鮓臭下痢水穀每服五粒黍米大幹薑湯下不拘時候前項疾症連綿日月熱藥不效者不拘老幼處心服餌立有神效玉霜丸即神應丸加輕粉滑石一方加南星青黛名比金丸糊丸麻子大治小兒驚風體熱喘粗涎嗽心忪頰赤大小便不利夜臥不安如一歲兒用一丸薄荷湯下如急驚風頭熱足冷口噤面青筋脈抽掣膈中頑涎甚者加一二丸煎桃符湯下蘊毒熱毒涎出立便安愈小兒瘡疥後餘毒食後以此湯解之黑神丸用巴豆二錢半鹽豉四兩為末滴水丸梧子大同大麥炒香水上浮不用麥酒吞二丸活人加五靈脂治濕痰食積紫霜丸用巴豆代赭石赤石脂一法加大黃治熱結一法加附子烏頭治寒結酒症丸用巴豆十五個雄黃皂角子大六塊蠍稍十五個白麵五兩為末水丸豌豆大候稍干入麩內炒香以一粒放水中如藥浮於水上即去麩不用每服二丸溫酒下一方無蠍稍加神麯葛根半夏水丸桐子大炒法同前治飲酒過度頭旋噁心嘔吐不止及酒積停於胃間遇飲即吐久而成癖走馬湯巴豆去皮心熬杏仁各二枚以綿纏捶碎熱湯二合捻取白汁飲之當下老小量之通治蜚尸鬼擊及中惡心滿腹脹大便不通柔金丸即走馬湯加雄黃等分寒食麵為丸緑豆大幹糖炒令黃色每服二丸治酒積安中丸用巴豆三十個不去皮杏仁十五個白礬一兩棗十枚去核用蒸餅劑四兩內藥味味各種並與棗和餅劑裹慢火燒黃熟去皮一處搗成膏子如蘿蔔子大每服六七丸食後白湯下透羅丹用半夏一兩皂角二兩去皮弦子杏仁六十個巴豆六十個用麩五升同炒令黃色為度去麩不用為末入寒食麵二兩炒黃色醋煮糊丸如緑豆大每服二丸食遠臨臥生薑湯下治胸膈痞悶酒食所傷並咳嗽等症感應丸治虛中積冷氣弱有傷停積胃脘不能傳化或因氣傷冷因飢飽食醉酒過多心下堅滿兩脅脹痛心腹大疼霍亂吐瀉大便頻並後重遲澀久痢赤白膿血相雜米穀不消愈而復發又治中酒嘔吐痰逆噁心喜睡頭旋胸膈痞悶四肢倦怠不欲飲食又治妊娠傷寒新産有傷若久有積寒吃熱藥不效者並悉治之大病不過三服便見痊愈此藥溫無毒並不燥熱不損胃氣亦不吐瀉止是磨化積聚消逐濕冷療飲食所傷快三焦滯氣旋丸如緑豆大每服百草霜用村莊家鍋底上刮者細研二兩巴豆七十個去皮心膜研細出盡油如粉杏仁一百四十個去皮尖及雙仁別研膏丁香新揀一兩半乾薑炮一兩肉豆蔻去粗皮二十個南木香去蘆頭二兩半上除巴豆粉百草霜杏仁三味外餘四味搗為細末於前三味同拌研令細用好蠟匱和先將蠟六兩熔化作汁以重綿濾去滓以好酒一升於銀石器內煮蠟溶數沸傾出候酒冷其蠟自浮取蠟稱用凡春夏修合用清油一兩於銚內熬令沫散香熟次用酒煮蠟四兩同化作汁就鍋內乘熱拌和前項藥末秋冬修合用清油一兩半同煎煮熱作汁和匱藥末成劑分作小鋌子以油單紙裹旋丸服餌此高殿前家方也神應丸即感應丸但用丁香木香各一錢乾薑炮百草霜各五錢四味各為末和勻重羅細肉豆蔻三錢杏仁五錢巴豆五錢炒去油微存性同研為泥將前末入泥中先備蠟二兩醋煮去垢溶化入油半兩勾同入泥與細末中研勻及數百回後至漿可搓作挺蠟紙封裹每挺可重一錢旋丸服治冷飲注瀉者立止海藏所攺法也醫壘兀戎按許學士云此方得之王景長之家近世名醫多用即知此方乃古方也惟此為真局方高殿前家亦非也本方雖云祕者能下泄者能止用之少效豫反覆本草味藥症但言巴豆得大者良豫攺法為神應丸溫白丸用川烏去皮臍二兩半紫菀去苗葉及土菖蒲去須九節者佳柴胡洗淨去蘆頭厚朴去粗皮生薑制桔梗去黑皮蘆頭吳茱萸用湯洗七次焙皂莢去弦子炒茯苓去皮乾姜炮黃連去皮人參去蘆頭巴豆去油心膜出油研炒桂去粗皮蜀椒去目炒半兩各為末入巴豆令勻蜜丸桐子大每服三丸食後臨臥服三丸生薑湯下漸加至五六丸治五積六聚十種水病八種痞塞九種心疼七十二種風三十六種遁尸及婦人一切諸疾連年纍月形瘦困憊但服此藥無不除愈易老治五積肺積息賁加人參紫菀心積伏梁加菖蒲黃連桃仁脾積痞氣溫白丸加吳茱萸乾薑肝積肥氣加柴胡川芎腎積奔豚加丁香茯苓遠志萬病紫菀丸即溫白丸加羌活獨活防風余藥分兩不同紫菀吳茱萸厚朴各一兩半菖蒲柴胡桔梗茯苓皂莢桂枝幹薑黃連各八錢蜀椒巴豆人參各五錢川烏八錢共為末入巴豆勻煉蜜丸如桐子大每服三丸漸加至五七丸食後臨臥生薑湯下治與切風患萬病如神惟有孕者忌服所下諸湯詳醫壘元戎蓍婆萬應丸用牛黃射香犀角硃砂雄黃黃連芫花人參茯苓大戟乾薑肉桂當歸芎藭芍藥甘遂黃芩細辛巴豆桔梗前胡紫菀蒲黃防風葶藶川椒桑皮禹餘糧各一兩蜈蚣二十八節去頭足炒芫青二十八枚糯米同炒黃色去頭足翅石蜥蜴去頭尾足炙四寸共為末入研藥勻煉蜜丸如小豆大療七種癖塊五種癲病十種注忤七種飛尸十二種蟲毒五種黃病十二種瘧病十種水病八種大風十二種痹風一切等病此藥以三丸為一劑服藥不過三劑萬病悉除故稱萬應丸若一歲以下小兒有疾令乳母服兩小豆大亦以吐以利為便黃芩湯治太陽少陽合病自下利者活人治挾熱自利名黃芩芍藥湯黃芩三兩苦寒甘草二兩炙甘平芍藥二兩酸平大棗十二枚擘甘溫上四味以水一斗煮取三升去滓溫服一升日再夜一服若嘔者加半夏半升生薑三兩名黃芩半夏生薑湯成無己云虛而不實者苦以堅之酸以收之黃芩芍藥之苦酸以堅斂腸胃之氣弱而不足者甘以補之甘草大棗之甘以補固腸胃之弱又曰太陽少陽合病自下利者病在半表半裡非汗下所宜故用黃芩湯以和解表裡之邪嘔者胃氣逆也故加半夏生薑以散逆氣防風芍藥湯即黃芩湯加防風治泄痢飧泄身熱脈弦腹痛而渴及頭痛微汗白朮芍藥湯即黃芩湯加白朮無黃芩治太陰脾經受濕水泄注下體微重微滿困弱無力不欲飲食暴瀉無無數水穀不化先宜此湯和之蒼朮芍藥湯用蒼朮二兩芍藥一兩黃芩肉桂各半兩為粗散每用一兩水煎服治痢疾痛甚者芍藥甘草湯治小腸腑發咳咳而失氣芍藥四兩甘草炙四兩上二味以水三升煮取一升五合去滓分溫再服生薑甘草湯用生薑五兩甘草四兩人參三兩大棗十五枚以水七升煮取三升分溫三服治肺痿咳唾涎沫不止咽燥而渴茯苓杏仁甘草湯治胸痹胸中氣塞短氣茯苓三兩杏仁五十個甘草一兩上三味以水一斗煮取五升溫服一升日三服不瘥更服桂苓五味甘草湯用桂枝四兩去皮茯苓四兩五味子半升甘草炙三兩治咳逆倚息不得臥用小青龍湯主之下已多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時覆冒者用此湯治其氣衝苓甘五味姜辛湯即桂苓五味甘草湯去桂加乾薑細辛各三兩治眼前湯沖氣即低而反更咳胸滿者用此湯治其咳滿桂苓五味去桂加乾薑細辛半夏湯即苓甘五味姜辛湯加半夏半升治服前湯咳滿即止而更不復渴沖氣復發者以姜辛為熱藥也服之當歸渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復內半夏以水其水苓甘五味加姜辛半夏杏仁湯即前方加杏仁半斤去皮尖治服前湯水去嘔止其形腫者加杏仁主之其證應內麻黃以其人遂痹故不內之若逆而內之者必厥所以然者以其人血虛黃髮其陽故也苓甘五味加姜辛半杏大黃湯即前方加大黃三兩治若面熱如醉此為胃熱上衝煮生面故加大黃以利之厚朴生薑半夏甘草人參湯治發汗後腹脹滿者厚朴半斤炙去皮生薑半斤半夏半升洗甘草二兩人參一兩上五味以水一斗煮取三升去滓溫服一升日三服炙甘草湯用甘草四兩炙人參阿膠各二兩生薑桂枝各三兩麥門冬麻仁各半升生地黃一斤大棗三十枚以清酒七升水八升先煮八味取三升去滓內膠糕盡溫服一升日三服一名復脈渴治傷寒脈結代心動悸者千金翼同星香湯治中風痰盛服熱藥不得者南星六錢木香不見火二錢生薑七片上㕮咀作一服水二鍾煎至一鐘不拘時服三生飲即星香湯加川烏生附子各三錢治卒中昏不知人事口眼喎斜半身不遂咽喉作聲痰氣上壅無問外感風寒內傷喜怒或六脈沉伏或指下浮盛並宜服之兼治痰厥飲厥及氣虛眩暈悉有神效痰涎壅盛者加全蠍三枚一方氣虛人去川烏南星名附香湯星附湯用天南星生附子去皮臍各一兩木香五錢不見火每服四錢生薑九片煎服不拘時溫服治諸中風服諸藥不效其人頑涎愈盛或前證不解或增困吃此方應之大醒風湯用南星八兩防風四兩獨活附子甘草俱生料全蠍微炒各二兩㕮咀每服四錢水二鍾生薑二十片煎八分去滓溫服治中風痰厥涎潮昏暈手足搐搦半身不遂及歷節痛風筋脈攣急壽星丸用天南星一斤先用炭火三十斤燒一地坑通紅去炭以酒五升傾坑內候漆酒盡下南星在坑內以盆覆之周圍用灰塞定勿令走氣次日取出為末加礞砂二兩琥珀一兩別研為末和勻生薑汁打麵糊丸如桐子大每服三十丸至五十丸煎石菖蒲人參湯送下治心腹因驚神不守舍風涎潮作手足抽掣健忘等證青州白丸子用半夏水浸洗七兩南星三兩白附子二兩川烏半兩去皮臍為末以生絹袋盛於井花水內擺出如未出者更以手揉出如有滓更研再入絹袋擺盡為度置瓷盆中日曬夜露至時撒去舊水用井水攪又曬至來日早再換新水攪如此法春五日夏三日秋七日冬十日去水曬乾復如玉片研細以糯米粉煎粥清丸如緑豆大薑湯下二十丸如癱瘓溫酒下小兒驚風薄荷湯三五丸治男婦手足癱瘓風痰壅盛嘔吐涎沫及小兒驚風婦人血風省風湯用生南星防風去蘆各四兩生半夏酒浸洗實黃芩生甘草各二兩每服四錢水二盞姜十片煎一盞不拘時溫服治卒急中風口噤全不能言口眼喎斜筋脈攣急抽掣疼痛風盛痰實旋暈僵仆頭目眩重胸膈煩滿左癱右瘓手足麻痹骨節煩疼步履艱辛恍惚不定神志昏憒一切風症可預服之辰砂丸用半夏一兩湯洗七遍辰砂半兩研天南星炮白附子炮白殭蠶去絲嘴炒蠍梢炒各一分硼砂研牛黃研各一錢為細末同研令均水煮麵糊為丸如梧桐子大每服二十丸用生薑荊芥湯下治諸風痰盛頭痛惡心目脹心忪胸膈煩悶急風散用生南星洗四兩辰砂研生川烏炮去皮臍各二兩上為細末每用酒調塗痛處治男子婦人偏正頭疼夾腦風太陽冗痛坐臥不安赤石脂禹餘糧湯治傷寒服藥利不止以理中湯與之利益甚此利在下焦此湯主之復利不止者當利其小便赤石脂太乙禹餘糧各一斤上二味以水六升煮取二升去滓分溫三服桃花湯用赤石脂一斤一半全用一半篩末乾薑一兩粳米一升三味以水七升煮米令熟去滓內赤石脂末方寸匕溫服七合日三服若一服愈余勿服治少陰病下利便膿血者赤石脂丸用赤石脂一兩蜀椒一兩烏頭一分炮附子半兩炮乾薑一兩末蜜之丸如梧子大先食服一丸日二服不知稍加服風引湯除熱癰癇治大人風引少小驚癇瘛瘲日數十發醫所不能療大黃乾薑龍骨各四兩桂枝三兩甘草牡蠣各二兩寒水石滑石赤石脂白石脂紫石英石膏各六兩上十二味杵粗篩以綿囊盛之取三指撮並井花水三升煮三沸溫服一升巢氏云腳氣宜風引湯滑石白魚散治小便不利滑石二分亂髮二分燒白魚二分上三味杵為散飲服半錢匕日三服蒲灰散用蒲灰七分滑石三分杵為散飲服方寸匕日三服治小便不利兼治厥而皮水者益元散一名天水散一名太白散一名六一散治中暑傷寒疫癘飢飽勞損憂愁思慮驚恐悲怒傳染並汗後遺熱勞復諸疾兼解兩感傷寒百藥酒食邪熱毒治五勞七傷一切虛損內傷陰痿驚悸健忘瘛癇煩悶短氣痰嗽肌肉疼痛腹脹悶痛淋閟淋濁服石石淋療身熱嘔吐泄瀉腸澼下痢赤白除煩熱胸中積聚寒熱止渴消畜水婦人産後損液血虛陰虛熱甚催生下乳治吹乳乳癰牙瘡齒疳此藥大養脾腎之氣通九竅六腑去留結益精氣壯筋骨和氣通經脈消水穀保真元明耳目安魂定魄強志輕身駐顏益壽耐勞役飢渴乃神驗之仙藥也用白滑石水飛過六兩粉甘草一兩為末每服三錢蜜少許溫水調下實熱用新汲水下解利用蔥豉湯下通乳用豬肉麵湯調下催生用香油漿下凡難産或死胎不下皆由風熱燥澀結滯緊斂不能舒緩過也此藥力至則結滯頓開而瘥矣白龍丸用滑石煅一兩硫黃四錢為末糊丸緑豆大用淡薑湯下治伏暑水泄清六丸即六一散加紅曲五錢治血痢溫六丸即六一散加乾薑五錢薑汁為丸治白痢茱萸六一散即六一散加茱萸湯泡過一兩此亦治濕熱吞酸之方也三生益元散用生柏葉生藕節生車前各汁一杯益元散三錢調服此主血淋之方也復方雙解散即防風通聖散合益元散一兩加蔥白十莖豆豉一合生薑半兩水一碗煎八分溫冷服一半取吐吐後服一半稍熱出汗能解利四時傷寒內外所傷又治風氣暑濕飢飽勞役內外諸邪所傷以致氣血怫鬱變成積熱發為汗病雜病又治傷寒傷風或有汗無汗表證悉具內熱口渴若自汗去麻黃八正散即六一散加車前子瞿麥萹蓄山梔子仁木通大黃麵裹煨去面切焙各一斤上為散每服二錢水一盞入燈心煎至七分去渣溫服食後臨臥小兒量力多少與之治大人小兒心經邪熱一切蘊毒咽乾口燥大渴引飲心忪面熱煩躁不寧目赤睛疼唇焦鼻衄口舌生瘡咽喉腫痛又治小便赤澀或癃閉不通及熱淋血淋滑石散用滑石一兩半白礬一兩火枯上為細末每服二錢用大麥粥湯食前調服以小便出黃水為度治女勞疸五皮散治風濕客邪於脾經氣風邪滯以致面目浮四肢腫滿心腹膨脹上氣喘促兼治皮水妊娠胎水五加皮地骨皮大腹皮茯苓皮生薑皮以上各二錢五分上作一服用水二鍾煎至一鍾食前服切忌生冷油膩堅硬之物淡寮方去五加皮地骨皮加陳皮桑白皮加味五皮湯即五皮散內腳腫加五加皮木瓜防己不服水土入胃苓湯五子五皮飲用紫蘇子炒七分蘿蔔子炒大分葶藶子醋炒存性五分香附子七分車前子大腹皮各六分茯苓皮山梔皮各八分生薑皮五分陳皮七分作一貼水煎服治水氣上氣喘急加味五皮飲用五加皮地骨皮生薑皮大腹皮茯苓皮薑黃術瓜是方七朱各等分作一貼水煎服治水病腰以下腫者分氣紫蘇飲用紫蘇桑白皮炙五味子去梗桔梗去蘆草果仁大腹皮白茯苓陳皮甘草炙各一錢半上作一服水二鍾生薑三片入鹽少許煎至一鍾空心服治男子婦人脾胃不利胸膈噎塞腹脅痛氣促喘急心下脹悶飲食不思嘔逆不止三子養親湯治年高痰盛氣實者紫蘇子沉水者白芥子蘿蔔子各三錢上作一服用水二鍾煎至一鐘不拘時服紫蘇子飲用真蘇子炒訶子煨去核蘿蔔子微炒杏仁去皮尖麩炒木香不見火人參各一錢半青皮甘草炙各三錢上㕮咀分二服每服用水二鍾生薑三片煎至八分食遠服治咳逆上氣膈因怒氣叫喊未定便夾氣飲食或飲食甫畢便用性恚怒以致食與氣相逆氣不得下或咳嗽不透氣逆噁心青氣化痰丸即三子養親湯去白芥子加半夏八兩南星八兩栝蔞黃連去須陳皮去白枳實麩炒茯苓去皮山楂以上各四兩乾生薑二兩甘草炙香附子炒黃芩以上各三兩上將南星切作十字塊半夏每個切作二塊皂莢六兩白礬三兩多用水將南星半夏皂莢白礬一處浸三宿煮至南星心黑潤為度取出皂莢不用將南星半夏曬乾同衆藥為末水糊為丸如梧桐子大每服七八十丸加至百丸食遠或臨睡茶清送下治清痢胸膈順每化痰寬中健脾消導飲食治痰之聖藥也
