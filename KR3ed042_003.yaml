飲食勞倦清氣下陷以致脾胃虛弱發熱頭痛四肢倦怠心煩肌瘦日漸羸弱此藥能升元氣退虛熱補脾胃生血氣黃耆病甚勞役熱甚者一錢甘草炙以上各五分人參去蘆三分有嗽去之以上三味除濕熱煩熱之聖藥也當歸身二分酒焙乾或日乾以和血脈橘皮不去白二分或三分以導氣又能益元氣得諸甘藥乃可若獨用瀉脾胃升麻二分或三分引清氣行少陽之氣上升白朮三分除胃中熱利腰臍間血薛新甫常用方參耆朮各一錢半歸一錢橘七分柴升甘草各五分薑棗煎服上八味㕮咀作一服水二盞煎至一盞量氣弱氣盛臨病斟酌水盞大小去滓食遠稍稍熱服加減法如腹中痛者加白芍藥五分炙甘草三分如惡寒冷痛者加去皮中桂一分或三分即桂心是也如惡熱喜寒而腹痛者於已加白芍藥二味中更加生黃芩三分或二分如夏月腹痛而不惡熱者亦然治時熱也如天涼時惡熱而痛於已加白芍藥甘草黃芩中更少加桂如天寒時腹痛去芍藥味酸而寒故也加益智三兩或二分或加半夏五分生薑三片如頭痛加蔓荊子二分或三分痛甚者加川芎二分如頂痛腦痛加藁本三分或五分如苦痛者加細辛二分華陰者佳諸頭痛者並用此四味足矣如頭上有熱則此不能治別以清空膏主之如臍下痛者加真熟地黃五分其痛亦止如不已者乃大寒也更加肉桂去皮二分或三分內經所説少腹痛皆寒證從復法相報中來也經云大勝必大復從熱病中變而作也非傷寒厥陰之證也仲景以抵當湯並丸主之乃血結下焦膀胱也如胸中氣壅滯加青皮一分如氣促少氣者去之如身有疼痛者濕若身重者亦濕加去桂五苓散一錢如風濕相搏一身盡痛加羌活防風藁本根以上各五分升麻蒼朮以上各一錢勿用五苓所以然者為風藥已能勝濕故別作一服與之如病去勿再服以諸風之藥損人元氣而益其病故也如大便祕澀加當歸稍一錢閉澀不行者煎成正藥先用一口調玄明粉五分或一錢得行則止此病不宜下下之恐變凶證也如久病痰嗽者去人參初病者勿去之冬月或春寒或秋涼時各宜加去根節麻黃五分如春令大溫只加佛耳草三分款冬花一分如夏月病嗽加五味子三十二枚麥門冬去心二分或三分如舌上白滑苔者是胸中有寒勿用之如夏月不嗽亦加人參三分或二分加五味子麥門冬各等分救肺受火邪也舊如病人能食而心下痞加黃連一分或三分如不能食心下痞勿加黃連如脅下痛或脅下急縮俱加柴胡三分甚則五分上方加減是飲食勞倦喜怒不節始病熱中則可用之若末傳為寒中則不可用也蓋甘酸適足益其病爾如黃耆人參甘草芍藥五味子之類也出東垣脾胃論調中益氣湯即補中益氣湯去當歸白朮加蒼朮木香治因飢飽勞役損傷脾胃脾胃虛弱四肢滿閉骨節煩疼難以屈伸身體沉重心煩口中無味不思飲食大小便不調或飧泄米穀不化胸滿短氣咽膈不通嗜臥無力黃耆人參湯即補中益氣湯去柴胡加麥門冬五味子蒼朮炒曲黃柏治脾胃虛弱上焦之氣不足遇夏天氣熱盛損傷元氣怠惰嗜臥四肢不收精神不足兩腳痿軟早晚寒厥日高復熱如火氣血俱不足等症清暑益氣湯即黃耆人參湯加澤瀉青皮葛根治長夏濕熱蒸人人感之四肢困倦精神短少懶於動作胸滿氣促肢節疼痛或氣高而喘身熱而煩心下膨悶小便赤而數大便溏而頻或利或渴不思飲食自汗身重升陽益胃湯即補中益氣湯加神麯生黃芩治婦人經候凝結黑血成塊臍左有血瘕水瀉不止谷不消化後血塊暴下並水俱作人參益胃湯即補中益氣湯加益智黃芩半夏蒼朮紅花治頭煩動即微痛不喜飲食四肢怠惰躁熱短氣口不知味腹鳴大便微溏身體昏悶竟渴不喜冷物升陽順氣湯即補中益氣湯去白朮加半夏草豆蔻神麯黃柏治飲食不節勞役所傷腹脅滿悶短氣遇春則口淡無味遇夏雖熱猶自惡寒飢則常如飽不喜食冷物調榮養氣湯即補中益氣湯去升麻加生地川芎細辛羌活防風治頭疼身熱惡寒微渴濈然汗出遍身作痛腳腿痠疼無力沉倦脈虛無力庸工不識因作正傷寒大發其汗致輕變重殊不知勞力內傷氣血外感寒邪宜少用辛溫之劑則愈名曰勞力感寒經曰勞者溫之損者溫之甘溫能除大熱此之謂也參耆益氣湯即補中益氣湯去當歸柴胡升麻加麥門冬五味子陽虛加附子治氣虛陽厥脈伏手足厥冷人參救肺散即補中益氣湯用歸尾蒼朮加白芍藥熟地蘇木治咳血吐血清燥湯即補中益氣湯加蒼朮茯苓豬苓澤瀉麥門冬五味子生地黃黃連黃柏神麯治六七月間濕令大行子能令母實而熱旺濕熱相合必刑庚大腸寒冷以救之燥金受濕熱之邪絶寒水生化之源源絶則腎虧痿厥之病大作腰以下痿軟癱瘓不能動行步不正一兩足欹側此方主之升陽除濕湯即補中益氣湯去人參白朮陳皮加羌活蒼朮各一錢五分防風藁本各一錢蔓荊子七分獨活五分治水疝者腎囊腫大陰汗不絶金匱順氣丸治婦人病飲食如故煩熱不得臥而反倚息者此名轉胞不得溺也以胞系了戾故致此病但利小便則愈崔氏名八味丸治腳氣上入少腹不仁千金用治虛勞不足渴欲飲水腰痛小腹拘急小便不利後人用治命門火衰不能生土以致脾胃虛弱飲食少思大便不實臍腹疼痛夜多漩溺等證神驗乾地黃八兩山茱萸肉薯蕷各四兩澤瀉白茯苓牡丹皮各三兩桂枝附子炮各一兩上八味末之煉蜜丸如梧子大酒下十五丸加至二十丸日再服潔古治腎消大病加減法方內桂附各用一兩春用三錢夏用一錢秋用五錢冬全用一兩加減八味丸仲景云常服去附子加五味子姚公云加五味子三兩蓯蓉四兩張文仲云五味子蓯蓉各四兩肘後方云地黃四兩附子澤瀉各一兩余各二兩薛新甫用治腎水不足虛火上炎發熱作渴口舌生瘡或牙齦潰爛咽喉作痛形體憔悴寢汗等證用五味子四兩王宇恭用五味子二兩十補丸即金匱腎氣丸加五味子鹿茸內附子五味子各二兩余各一兩治腎臟虛冷麵黑耳聾足寒膝軟小便不利腎氣丸地黃茯苓玄參各五兩薯蕷山茱萸桂心澤瀉芍藥各四兩附子三兩共九味千金翼有牡丹皮四兩共十味一方無附子有半夏一兩而分兩不同治腎氣不足羸瘦日劇呼吸少氣體重耳聾眼暗百病地黃丸一名六味地黃丸即仲景腎氣丸錢仲陽去附子肉桂治腎經不足發熱作渴小便淋閉氣壅痰嗽頭目眩暈眼花耳聾咽噪舌痛齒牙不固腰腿痿軟自汗盜汗便血諸血失音水泛為痰血虛發熱等證其功不能盡述加減金匱腎氣丸即仲景腎氣丸加車前子牛膝內熟地用四兩茯苓三兩附子五錢余各一兩濟生以附子為君此薛新甫重定者治肺腎虛腰重腳腫小便不利或肚腹腫脹四肢浮腫或喘急痰盛已成蠱症其效如神此證多因脾胃虛弱治失其宜元氣受傷而變證者非此藥不能救腎氣丸即加減八味丸加鹿角沉香八味各一兩沉香官桂各五錢治三消弱甚者加附子一兩都氣丸即仲景腎氣丸加五味子補左右二腎水火兼益滋陰補腎丸即六味地黃丸加生地當歸尾柴胡五味子治肝胃陽虛陰弱虛火上炎目視昏花或至夜昏暗緊澀還少丹即六味地黃丸去丹皮澤瀉加牛膝杜仲肉蓯蓉遠志石菖蒲茴香巴戟枸杞五味楮實子各等分為末棗肉並煉蜜為丸梧子大每服五七十丸空心溫酒或鹽湯下治脾腎虛寒飲食少思發黃盜汗遺精白濁又治真氣虧損肌體瘦弱濟陰地黃丸用熟地黃山茱萸乾山藥加五味子麥門冬當歸肉蓯蓉枸杞甘菊花巴戟肉各等分為末煉蜜丸桐子大每服七八十丸空心白湯下治足三陰虧損虛火上炎致目睛散大視物不的或昏花澀緊作痛畏明或卒見非常之處其效與還少丹相似地黃飲子即金匱順氣丸去山藥澤瀉丹皮加蓯蓉巴戟遠志石菖蒲石斛五味子麥門冬各等分入薄荷少許薑棗煎服治腎氣虛弱舌喑不能言足痿不能行復方三一腎氣丸即六味地黃丸合固本丸補陰丸補心腎諸臟精血瀉心腎諸臟火濕附固本丸方用生地黃熟地黃天門冬麥門冬各等分為末煉蜜為丸梧子大每服五十丸空心溫酒或用淡鹽湯下附補陰丸方用黃柏鹽水炒知母鹽水炒灶板酥炙各三兩鎖陽酥炙二兩枸杞子五味子天門冬去皮心白芍藥酒浸五兩乾薑炮三錢冬五錢為末煉蜜入豬脊髓三條炊熟和丸桐子大每服八十丸空心淡鹽湯下冬月溫酒下人參固本丸即固本丸加人參本草云人參通心氣故宜加治肺熱燥作渴或小便短赤如淋此治虛而有火之聖藥也肺主氣而氣根于丹田肺畏火而制火必本於腎水也鹿柏固本丸即固本丸加鹿角霜半斤黃柏一斤黃柏分四制酒炒四兩人乳浸曬半斤鹽水炒四兩六合丸即固本丸加枸杞子地骨皮能明目天地丸一名二儀丸即固本丸去熟地麥門冬三才丸即固本丸去熟地麥門冬加人參為末煉蜜丸空心服治虛勞忌鯉魚補髓煎即固本丸去熟地麥門冬加當歸永壽丹即固本丸去熟地麥門冬加枸杞甘菊能明目三才封髓丹明三六丸每味半兩加黃柏三兩砂仁一兩半甘草七錢半炙為細末麵糊丸桐子大每服五十丸用蓯蓉半兩切作片酒一盞浸一宿次日煎三四沸去滓空心食前送下能降心火益腎水滋陰養血潤補不燥地芝丸即天地丸加枳殼麩炒甘菊花各二兩為末煉蜜丸如梧子大每服百丸茶清或溫酒下治目不能遠視能近視或妨近視乃陰氣不足陽氣有餘也調衛湯即固本丸去熟地加麻黃根黃耆各一錢甘草稍生用當歸稍黃芩各半錢五味子七粒豬苓二分羌活七分蘇木紅花各一分上㕮咀水煎溫服治自汗大補丸治陰火為病黃柏苦寒去皮鹽酒炒褐色上一味為細末水丸梧子大血虛四物湯下氣虛四君子湯下按朱丹溪云黃柏走至陰有瀉火補陰之功非陰中之火不可用也火有二君火者人火也心火也可以濕伏可以水滅可以直折黃連之屬可以制之相火者天火也龍雷之火也陰火也不可以水濕折之當從其性而伏之惟黃柏之屬可以降之坎離丸用黃柏一斤分作四分用醇酒蜜湯鹽水童便浸洗曬炒為末以知母一斤去毛切搗熬膏和丸每服七十丸白湯下治上盛下虛水火偏盛消中等症古書言知母佐黃柏滋陰降火有金水相生之義黃柏無知母猶水母之無蝦也蓋黃柏能制膀胱命門陰中之火知母能清肺金滋腎水之化原故潔古東垣丹溪皆以為滋陰降火要藥上古所未言也滋腎丸用黃柏知母各一兩酒洗焙碾入桂一錢為引熟水丸如芡實大每服百丸沸湯下治熱在血分不渴而小便不利或腎虛足熱腿膝無力等症內經云熱者寒之腎苦燥急食辛以潤之以黃柏之苦寒瀉熱補水潤燥為君知母之苦寒瀉腎火為佐肉桂辛熱為使寒因熱引也真珠粉丸用黃柏炒真蛤粉各一斤為末每服百丸空心湯酒下治赤白濁淫及夢泄滑精一方加知母炒牡蠣煅山藥炒等分為末糊丸梧子大每服八十丸鹽湯下二妙散即丹溪大補丸加蒼朮米泔浸七日等分為末空心酒服三錢治濕熱腰膝疼痛三補丸用黃柏黃芩黃連俱酒浸等分水煎服治三焦有火嗌喉乾燥小便赤濕大便祕結加味三補丸即三補丸加香附醋浸五日蒼朮米泔浸七日水煎服治鬱火𩞄雜補腎丸用黃柏鹽酒炒龜板酥炙各四兩杜仲薑汁炒牛膝陳皮各二兩夏加五味子一兩炒冬加乾薑五錢水煎服此亦治濕腎陰之方也正氣湯用黃柏炒知母炒各一錢五分甘草炙五分水煎服治陰虛有火令人盜汗之方也虎潛丸用黃柏鹽酒炒知母鹽酒炒熟地黃各三兩白芍藥酒炒陳皮鹽水潤曬乾牛膝各二兩龜板四兩酥炙鎖陽酒潤曬乾當歸各一兩半酒洗虎脛骨一兩酥炙上為細末羊肉為丸每服二三錢治氣疝者拂鬱則睪丸腫大悲哀則不藥而消生脈散治熱傷元氣肢體倦怠氣短懶言口乾作渴汗出不止或濕熱大行金為火制絶寒水生化之源致肢體痿軟腳欹眼黑及肺虛氣弱汗出息短而脈數或散代者人參五錢麥門冬三錢五味子三錢上三味水煎服千金加黃柏東垣云夏月服生脈散加黃耆令人氣力湧出愚按內經曰肺熱傷氣肺主氣故君以人參之甘寒瀉火而補元氣臣以麥門冬之苦甘寒清金而濕水源佐以五味子之酸溫生腎精而收耗氣此皆補天元之貞氣非補火熱也麥門冬飲子用五味子十個麥門冬去心半錢人參當歸身各五分黃耆一錢生地黃五錢上作一服水二鍾煎至一鍾去渣稍熱服不拘時治吐血久不愈或肺氣虛而短氣不足以息或腎虛發熱唾痰皮毛焦燥一方有芍藥紫菀無生地一方無當歸黃耆有栝蔞實幹葛知母茯神五味子湯用生脈散加杏仁陳皮生薑水煎服治肺虛作喘脈大者人參飲子用生脈散加黃耆甘草當歸白芍藥治暑月衄血龍膽瀉肝湯用生脈散合黃連解毒湯去黃柏加柴胡龍膽草天門冬甘草知母上水煎服治肝經濕熱小便赤澀或寒熱脅脹痰咳等症凡肝經有餘之症並宜服之梅花聚香湯用生脈散加天花粉烏梅肉枇杷葉栝蔞實黃耆乾葛檀香上為細末每服三錢熟水調下治消湯飲水至石鬥病極者可服之即愈寧肺湯用生脈散合八珍湯加桑皮阿膠生薑蘇葉煎服治營衛俱虛發熱自汗肺氣喘急咳嗽痰涎人參款花膏用生脈散加款冬花紫菀桑白皮上為細末煉蜜為丸如雞頭實大每服一丸細嚼薑湯下治肺受虛寒久嗽不已咽膈滿悶痰涎嘔逆噁心腹脅脹滿腰背倦痛或虛勞冷嗽及遠年近日一切嗽病服諸藥不效皆治知母茯苓湯用生脈散合四君子小柴胡加知母薄荷川芎阿膠款花桔梗治肺痿咳嗽氣喘不已往來寒熱自汗生脈散加香薷方即生脈散加香薷上四味水煎服治人本陰虛復遇暑途飢困勞倦暴僕昏絶者延齡育子方即生脈散加川巴戟去心白朮白茯苓川牛膝生地黃熟地黃天門冬肉蓯蓉去心枸杞子菟絲子去心蓮鬚白茯神山藥薑汁炒山茱萸去核沙苑蒺藜炒柏子仁鹿角霜各五兩酸棗仁遠志石斛各二兩上為細末煉蜜為丸如梧桐子大每服百丸空心鹽易吞下此亦廣嗣之方也黃耆六一湯治男婦諸虛不足肢體勞倦胸中煩悸時常焦渴唇口乾燥面色痿黃不能飲食常服平補氣血安和臟腑黃耆去蘆蜜炙六兩甘草一兩上二味為粗散每服六錢水一盞薑三片棗一枚煎六分溫服一方減黃耆四兩名托裡黃耆湯治諸瘡疽發渴脈虛耆附湯用黃耆蜜炙附子炮等分每劑四錢生薑水煎服治氣虛陽弱汗不止肢體倦怠等症當歸補血湯用黃耆蜜炙一兩當歸酒製三錢用水煎服治血氣損傷或妄服峻劑致氣血益虛肌熱大渴引飲目赤面紅脈洪大而虛重按全無此病多得於飢飽勞役者當歸黃耆湯用當歸二兩黃耆二兩芍藥一兩半炒每服五錢生薑三片水煎服治産後失血過多腰疼身熱自汗黃耆湯用綿黃耆陳皮去白各一兩半上為細末每服三錢用大麻仁一合爛研以水投取漿一盞濾去滓於銀石器內煎候有乳起即入白蜜一大匙再煎令沸調藥末空心服治高年老人大便祕澀甚者兩服愈神效黃耆湯用黃耆三兩甘草炙白芍藥各一兩人參八錢蔓荊子一錢橘紅五分每用五錢水煎臨臥服治渾身麻木不仁或左右身麻木或頭面手臂腿腳麻木不仁者並皆服之如兩目緊急縮小及羞明畏日或癮澀難開或視物無力睛痛手不得近或日中如火等症三黃補血湯用熟地黃二錢生地黃三錢當歸一錢柴胡二錢半升麻一錢白芍藥半兩牡丹皮一錢川芎二錢黃耆一錢每服五錢水二大盞煎至一盞去滓稍熱服補之大過以防血溢上竭兩寸脈芤兩頭則有中間全無而虛曰芤血在上焦或衄或嘔血用犀角地黃湯則愈治六脈俱大按之空虛必面赤善驚上熱乃手少陰心之脈也此氣盛多而亡血以甘寒鎮墜之劑大瀉其氣以墜氣浮以甘辛溫微苦酸補其血當歸六黃湯用當歸黃柏生地黃熟地黃黃芩黃連以上各一錢半黃耆二錢上作一服水二鍾煎至一鍾臨臥服治盜汗之聖藥也
