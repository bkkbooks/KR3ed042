body:
  text: 卷之三茯苓四逆湯即四逆湯加茯苓四兩人參一兩四逆湯補陽再參苓以益陰治汗下後不解煩躁者芍藥甘草附子湯即四逆湯去乾薑加芍藥三兩甘草一兩治發汗病不解反惡寒者虛故也芍藥之酸收斂津液而益榮附子之辛溫固陽氣而固衛甘草之甘調和辛酸而安正氣桂枝附子湯即四逆湯去乾薑加桂枝四兩生薑二兩大棗十二枚治傷寒八九日風濕相搏身體疼煩不能轉側不嘔不渴脈浮虛而澀者甘草附子湯即四逆湯去乾薑加白朮二兩桂枝四兩治風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風或身微腫者白朮附子湯近效名朮附湯即四逆湯去乾薑加白朮二兩薑棗煎服治證同前但大便堅小便自利者真武湯治少陰病四五日腹痛小便不利四肢沉重疼痛自下利者茯苓三兩甘平芍藥三兩酸平生薑三兩切辛溫白朮二兩甘溫附子一枚炮去皮破八片辛熱上五味以水八升煮取三升去滓溫服七合日三服加減法若咳者加五味子半升細辛乾薑各一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩若嘔者去附子加生薑足前成半斤成無己曰真武北方水神也而屬腎用以治水焉水氣在心下外帶表而屬陽必應發散故治以真武湯青龍湯主太陽病真武湯主少陰病少陰腎水也此湯可以和之內經曰脾惡濕甘先入脾茯苓白朮之甘以益脾逐水寒淫所勝平以辛熱濕淫所勝佐以酸平附子芍藥生薑之酸辛以溫經散濕理中湯金匱名人參湯治胸脾心下痞氣氣結在胸胸滿脅下逆搶心傷寒論理中圓治霍亂頭痛發熱身疼寒多不用水者人參甘溫甘草甘平炙白朮甘溫乾薑辛熱以上各三兩上四味搗篩為末蜜和丸如雞子黃大以沸湯數合和一丸研碎溫服之日三四夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服服湯後如食頃飲熱粥一升許微自汗勿發揭衣被成無己曰心肺在上為陽腎肝在下為陰此上下臟也脾居中州名曰孤臟位處中焦以灌溉四傍理中湯丸專治脾胃之劑也脾胃一病則上下左右無病不至故又有諸加減法焉又曰內經曰脾欲緩急食甘以緩之用甘補之人參白朮甘草之甘以緩脾氣調中寒淫所勝平以辛熱乾薑之辛以溫脾散寒者加減法若臍下築者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用術悸者加茯苓二兩此方已具四君子湯渴欲得水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚附子理中湯即理中湯加附子一兩治脾胃冷弱心腹疼痛嘔吐泄利霍亂轉筋體冷微汗手足厥寒心下逆滿腹中雷鳴嘔噦不止飲食不進一切沉寒痼冷並皆治之治中湯即理中湯加橘紅青皮各一兩治食積心腹滿痛霍亂吐瀉過傷生冷腥膾吐逆不止嘔吐者加丁香半夏各一兩每服生薑十片煎補中湯即理中湯加橘紅茯苓各一兩治脾胃不和寒而作嘔如溏泄不已者更加附子二兩不喜飲水穀不化者再加縮砂仁一兩共成八味四順湯即理中湯去白朮加熟附子一云加茯苓治霍亂吐下心腹作痛手足逆冷又治身熱脈沉苦煩默默不欲見光時腹痛下利枳實理中湯即理中湯中加枳實茯苓各一兩治吐利後胸痞欲絶心膈高起急痛手不可近者若渴再加栝蔞根一兩石膏理中湯即理中湯中加火煅石膏一兩治霍亂後轉筋者大建中湯即理中湯去白朮甘草加蜀椒二合去汗治心胸中大寒痛嘔不能食腹中寒上衝皮起出見有頭足上下痛而不可觸近連理湯即理中湯中加茯苓黃連治傷寒陰症而渴黃耆湯即理中湯加黃耆白芍藥治傷寒兩感陰盛陰虛自汗等症增損理中丸即理中丸加枳實四枚茯苓二兩栝蔞根二兩牡蠣熬二兩末之蜜丸如彈子大每服一丸熱水化下不歇復服治時行四五日心中結滿兩脅痞塞胸中氣急逆欲絶諸藥不療崔氏曰余時用此效的神速下喉即減續復與之不過五六丸胸中豁然矣用藥之速未嘗見此然渴者當加栝蔞根不渴除之下者當加牡蠣不下勿用余因以告領軍韓康伯右衛毛仲祖光祿王道預靈臺郎顧君苗著作殷仲堪諸人並悉用之咸嘆其應速於時枳實乃為之貴忌海藻菘菜酢物桃李省核等深師同四君子湯治營衛氣虛臟腑怯弱心腹脹滿全不思食腸鳴泄瀉嘔噦吐逆大人小兒脾胃不和中脘停飲大病之後尤宜服之人參一兩茯苓一兩白朮一兩甘草五錢上㕮咀水一盞薑七片棗一枚煎至七分去滓服按本草人參甘溫安精神能補五臟之元氣白朮甘溫理脾胃能補五臟之母氣茯苓甘平能致五臟之清氣甘草甘平能調五臟愆和之氣甘得中之味溫得中之氣誠無愧和衷之君子也異功散即四君子湯加陳皮尤宜病後調理兼治小兒吐瀉六君子湯即四君子湯加半夏陳皮一方去甘草加枳殼治素有痰飲胸膈痞滿脾胃虛寒不嗜飲食服燥藥不得者一方加黃耆山藥亦名六君子湯麥門冬湯即六君子湯加麥冬小麥烏梅治霍亂麥門冬湯即異功散加葳蕤麥冬蘆根竹茹陳米生薑煎服治漏氣嘔吐人參湯即麥門冬湯去麥冬甘草加黃芩梔子知母石膏補中湯又名調中丸即四君子湯加乾薑脾胃不和而作嘔又治傷寒兩感白芍良薑湯即四君子湯加白芍良薑治吐瀉轉筋腹痛體重脈沉細者加味四君子湯即四君子湯加秦艽黃蠟治勞嗽朱君散即四君子湯加硃砂麝香燈心鉤藤湯下治小兒吐瀉後虛弱驚悸糞青烏蠍四君子湯即四君子湯加川烏全蠍治慢驚風加味四柱飲即四君子湯去甘草加木香熟附子治丈夫元臟氣虛真陽耗散兩耳常鳴臍腹冷痛頭眩目暈四肢倦急小便數滑泄瀉不止加薑棗煎服惺惺散即四君子湯加桔梗細辛栝蔞仁薄荷三葉生薑煎服治小兒風熱瘡疹傷風時氣頭痛壯熱目澀多眠咳嗽氣粗鼻塞清涕及傷食錢氏白朮散即四君子湯加藿香木香乾葛各一兩治小兒泄瀉冒熱煩渴不問陰陽並宜服之又名調中人參湯去乾葛加茯神名內救散治小兒泄瀉四獸飲即六君子湯加草果烏梅生薑煎服治五臟氣虛喜怒不節勞役兼致陰陽相勝結聚涎飲發為瘡疾兼治瘴瘧最有神效加減四君子湯即四君子湯加黃耆扁豆藿香治吐瀉快脾飲即四獸飲去茯苓加厚朴砂仁附子減甘草薑棗煎服治脾寒易簡斷下湯四君子湯去人參加草果瞿麥粟醋製薑棗烏梅煎服治下痢赤白日久甘草乾薑茯苓白朮湯即四君子湯去人參加乾薑二兩茯苓一兩寒濕著體重腹以下冷痛身勞汗出脾傷寒濕不渴小便利三因名腎著湯茯苓桂枝白朮甘草湯即四君子湯去人參加桂枝治傷寒吐下後心下逆滿氣上衝胸頭眩身搖脈沉緊經自陽不足者補之以甘茯苓白朮生津而益陽陽也裡氣逆者散之以辛桂枝甘草行陽散氣桂枝人參湯即四君子湯去茯苓加桂枝幹薑歸脾散即四君子湯加黃耆當歸棗仁遠志木香龍眼肉治思慮過多勞傷心脾健忘怔忡內救散即四君子湯加木香藿香茯神治小兒泄瀉八味順氣散即異功散加白芷青皮烏藥治中風先宜服此藥以順其氣次用治風之藥順風勻氣散即八味順氣散去茯苓陳皮加天麻紫蘇木瓜沉香治中風中經絡遂口眼喎斜腰腿疼痛小麥門冬湯即六君子湯加小麥麥門冬烏梅生薑治白朮湯即六君子湯加木香黃耆乾葛治小兒泄瀉胃熱煩渴一方加半夏乾薑嘔吐一方加扁豆乾山藥名六君子湯加附子服之治虛冷泄瀉養脾丸即四君子湯加乾薑砂仁麥芽補養脾胃附子湯即四君子湯加生附官桂芍藥治風寒濕痹骨節痛皮膚不仁肌肉重著無官桂甘草治少中和其背惡寒者茯苓飲即四君子湯去甘草加枳實陳皮生薑治胸中停飲心下宿水吐水氣滿不欲食半夏湯一名大半夏湯即四君子湯加半夏官桂附子甘草湯即四君子湯去人參加官桂治停飲目眩酸棗仁湯即四君子湯加酸棗仁治振悸不得眠六神湯即四君子湯加黃耆白扁豆治痔漏下血面色痿黃脾胃虛弱四肢乏力飲食無味中氣下陷不能攝血並治脾虛吐瀉七珍湯即四君子湯加山藥黃柏粟米薑棗煎服治勞瘵咯血參苓白朮散即四君子湯加山藥白扁豆蓮肉薏苡仁砂仁桔梗治脾胃虛弱泄瀉一切病後以此調理脾胃如治噤口痢加石菖蒲枳殼陳米平和飲子即四君子湯去白朮茯苓治小兒變蒸四君子加薑附厚朴湯即四君子湯加生薑附子厚朴治霍亂吐瀉不止夜急尤甚者黃耆湯即四君子湯加黃耆芍藥生薑煎服衝脈弦細芤遲者一方加藿香治三焦虛實自汗本方與四物湯各半名托裡消毒散合十全散去茯苓加川芎當歸名托裡解膿散五飲湯即六君子湯合五苓散加枳實旋覆花厚朴前胡芍藥治五飲若因飲酒有飲者加葛花縮砂仁八味定志丸即四君子湯去甘草加菖蒲遠志硃砂麥門冬等分蜜丸桐子大米飲湯下三十丸每服十丸日三服亦可補益心神安魂魄治痰去胞中邪熱理肺腎人參湯即四君子湯加歸芍半夏曲柴胡黃芩乾葛治五勞胃風湯即四君子合四物湯去甘草地黃加桂治大人小兒風冷乘虛客於腸胃水穀不化泄瀉注下及腸胃濕毒下如豆汁或下瘀血逍遙散即四君子湯去人參加當歸芍藥柴胡治肝脾血虛發熱或耳內及胸乳腹脹小便不利一方有人參薄荷加味逍遙散即逍遙散加山梔牡丹皮薑水煎服同前而熱甚者四君子湯加竹瀝薑汁方即四君子湯加竹瀝薑汁治半身不遂在右者屬氣虛復方八珍湯即四君子合四物湯治肝脾傷損氣血虛弱惡寒發熱或煩躁作渴或胸膈不和大便燥實等證大秦艽湯即八珍湯去人參加秦艽石膏羌活獨活防風黃芩白芷生地黃各一兩細辛五錢治中風外無六經之形症內無便溺之阻隔乃血弱不能養筋故手足不能運動舌強不能語言也大補湯四君子合四物加黃耆肉桂治男婦諸虛不足五勞七傷生血氣補脾胃赤茯苓湯即四君子合二陳湯去甘草加川芎順氣消痰止嘔調中益氣補胃大防風湯即十全大補湯去茯苓肉桂加附子杜仲牛膝防風羌活薑棗煎服大建中湯即十全大補湯加半夏附子門冬肉蓯蓉薑棗煎服治腰痛大補黃耆湯即十全大補湯去芍藥加防風山茱萸五味子肉蓯蓉薑棗煎服若自汗不止服諸藥固表並無效驗藥服之而汗愈不收止可理心血蓋汗乃心之液心無所養不能攝血故溢而為汗宜此湯加酸棗仁主之有微熱更加石斛三痹湯用十全大補去白朮加防風秦艽細辛獨活杜仲牛膝川續斷上作一服水二鍾生薑三片棗一枚煎至一鐘不拘時服治血氣澀滯手足拘攣風痹等疾薯蕷丸用薯蕷三十分甘草二十八分桂枝神麯大豆黃卷當歸乾地黃各十分川芎芍藥白朮麥門冬杏仁防風各六分柴胡桔梗茯苓各五分人參阿膠各七分乾薑三分白蘞二分大棗百枚為膏共二十一味末之煉蜜和丸如彈子大空腹酒服一丸一百為劑治虛勞諸不足風氣百疾牛黃清心丸用白芍藥麥門冬去心黃芩當歸去苗防風去苗白朮各一兩半柴胡桔梗芎藭白茯苓去皮杏仁去皮尖雙仁麩炒黃別研各一兩二錢半神麯研蒲黃炒人參去蘆各二兩半羚羊角屑麝香研龍腦研各一兩肉桂去粗皮大豆黃卷碎炒阿膠碎炒各一兩七錢半白蘞乾薑炮各七錢半牛黃研一兩二錢犀角屑二兩雄黃研飛八錢乾山藥七兩甘草銼炒五兩金箔一千二百片內四百片為衣大棗一百枚蒸熟去皮核研成膏上除棗杏仁金箔二角及二黃腦麝四味另研外為細末入余藥和勻用煉蜜與棗膏為丸每兩作十丸金箔為衣每服一丸溫水化下食後服治諸風緩縱不隨語言